<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave — Campus Chart</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins:wght@300;400,500,600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
:root{
  --blue:#00f0ff;
  --violet:#9c4dff;
  --green:#00ff94;
  --yellow:#ffcc00;
  --bg:#050018;
  --glass:rgba(255,255,255,.08);
  --text-light:rgba(255,255,255,.85);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}
body{background:var(--bg);color:#fff;min-height:100vh;display:flex;flex-direction:column;}
header{
  display:flex;justify-content:space-between;align-items:center;padding:16px 20px;
  backdrop-filter:blur(12px);background:rgba(0,0,0,.35);border-bottom:1px solid rgba(255,255,255,.08);
}
header h1{font-family:Orbitron;font-size:1.5rem;background:linear-gradient(90deg,var(--blue),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
header button{padding:10px 16px;border:none;border-radius:999px;font-family:Orbitron;background:linear-gradient(90deg,var(--blue),var(--violet));color:#050015;cursor:pointer;transition:.3s;}
header button:hover{transform:translateY(-2px);box-shadow:0 0 15px var(--blue),0 0 30px var(--violet);}
.container{max-width:1200px;margin:20px auto;padding:16px;display:flex;flex-direction:column;gap:24px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.card{background:var(--glass);padding:20px;border-radius:18px;border:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;gap:12px;transition:.3s;}
.card:hover{transform:translateY(-5px);box-shadow:0 0 30px var(--blue),0 0 50px var(--violet);}
.card h3{font-family:Orbitron;margin-bottom:8px;}
.card p{font-size:0.9rem;color:var(--text-light);}
.audio-player{position:fixed;bottom:0;left:0;width:100%;background:var(--glass);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:12px 20px;gap:20px;z-index:999;border-top:1px solid rgba(255,255,255,.12);}
.audio-player audio{width:70%;border-radius:12px;}
.audio-player button{padding:8px 14px;border:none;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--violet));color:#050015;font-family:Orbitron;cursor:pointer;}
.chart-container{background:var(--glass);padding:20px;border-radius:18px;border:1px solid rgba(255,255,255,.12);}
@media(max-width:600px){
  .cards{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>
  <h1>Campus Wave — Campus Chart</h1>
  <button onclick="window.location.href='dashboard.html'">Dashboard</button>
</header>

<div class="container">

  <div class="chart-container">
    <canvas id="campusChart"></canvas>
  </div>

  <h2 style="margin-top:24px;">Top Tracks</h2>
  <div class="cards" id="topTracks"></div>

</div>

<div class="audio-player" id="audioPlayer" style="display:none;">
  <audio id="player" controls></audio>
  <button onclick="tipArtist()">Tip Artist</button>
</div>

<script>
// === LOAD USERS AND MUSIC ===
let users = JSON.parse(localStorage.getItem("users")) || {};
let allTracks = [];
Object.values(users).forEach(u=>{
  if(u.music){
    u.music.forEach(t=>{
      allTracks.push({...t, artist:u.name || "Unknown"});
    });
  }
});

// SORT TOP TRACKS BY LISTENERS DESC
allTracks.sort((a,b)=>b.listeners - a.listeners);

// === TOP TRACKS GRID ===
const topTracksEl = document.getElementById("topTracks");
const audioPlayer = document.getElementById("audioPlayer");
const player = document.getElementById("player");

function renderTopTracks(){
  topTracksEl.innerHTML="";
  allTracks.forEach((track, idx)=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `<h3>${track.name}</h3>
                     <p>Artist: ${track.artist}</p>
                     <p>Listeners: ${track.listeners || 0}</p>
                     <p>Tips: ${track.tips || 0} ZAC</p>
                     <button onclick="playTrack(${idx})">Play</button>`;
    topTracksEl.appendChild(div);
  });
}
function playTrack(idx){
  const track = allTracks[idx];
  player.src = track.url;
  audioPlayer.style.display="flex";
  // increment listeners locally
  track.listeners = (track.listeners || 0)+1;
  // Update user music count
  Object.values(users).forEach(u=>{
    if(u.music){
      u.music.forEach(t=>{
        if(t.url===track.url) t.listeners = track.listeners;
      });
    }
  });
  localStorage.setItem("users",JSON.stringify(users));
  renderTopTracks();
}
function tipArtist(){alert("Tips will be enabled after Zep Cash presale launch!");}

renderTopTracks();

// === CHART.JS ===
const ctx = document.getElementById('campusChart').getContext('2d');
const chartLabels = allTracks.slice(0,10).map(t=>t.name);
const chartData = allTracks.slice(0,10).map(t=>t.listeners || 0);
const campusChart = new Chart(ctx,{
  type:'bar',
  data:{
    labels: chartLabels,
    datasets:[{
      label:'Listeners',
      data: chartData,
      backgroundColor:'rgba(0,240,255,0.5)',
      borderColor:'#00f0ff',
      borderWidth:2
    }]
  },
  options:{
    responsive:true,
    plugins:{
      legend:{display:false},
      tooltip:{mode:'index',intersect:false}
    },
    scales:{
      y:{beginAtZero:true,ticks:{stepSize:1}},
      x:{ticks:{color:'#fff'}}
    }
  }
});
</script>

</body>
</html>
