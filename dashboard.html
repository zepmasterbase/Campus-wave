<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#00f0ff;
  --violet:#9c4dff;
  --green:#00ff94;
  --bg:radial-gradient(circle at 20% 10%, #050018, #00000c);
  --glass:rgba(255,255,255,.08);
  --text-light:rgba(255,255,255,.85);
  --card-radius:20px;
}

/* RESET */
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}
body{background:var(--bg);color:#fff;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0;}

/* HEADER */
header{
  width:100%;
  padding:16px 24px;
  display:flex;justify-content:space-between;align-items:center;
  background:rgba(0,0,0,0.3);
  border-bottom:1px solid rgba(255,255,255,.1);
  box-shadow:0 0 12px rgba(0,255,255,.2);
}
.brand{
  display:flex;align-items:center;gap:12px;font-family:Orbitron;font-size:1.5rem;
}
.brand img{width:50px;height:50px;border-radius:50%;box-shadow:0 0 20px var(--blue),0 0 30px var(--violet);}
.home-btn{
  background:linear-gradient(135deg,var(--blue),var(--violet));
  border:none;border-radius:50%;
  width:50px;height:50px;cursor:pointer;
  font-size:20px;color:#050015;
  display:flex;align-items:center;justify-content:center;
  transition:.3s;
}
.home-btn:hover{transform:scale(1.05);}

/* DASHBOARD CARDS */
.dashboard-container{
  width:95%;
  max-width:900px;
  margin:20px auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
  gap:20px;
}

.card{
  background:var(--glass);
  border-radius:var(--card-radius);
  padding:20px;
  box-shadow:0 0 30px rgba(0,240,255,.25);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  transition:.3s;
}
.card:hover{
  transform:translateY(-5px);
  box-shadow:0 0 50px rgba(0,240,255,.4);
}

.card h3{
  margin-bottom:10px;
  font-family:Orbitron;
  font-size:1.2rem;
}

/* Zep Swipe Verification Button */
.verify-btn{
  background:linear-gradient(90deg,var(--blue),var(--violet));
  color:#050015;
  border:none;
  border-radius:999px;
  padding:12px 20px;
  cursor:pointer;
  font-family:Orbitron;
  margin-top:8px;
  transition:.3s;
}
.verify-btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 20px var(--blue),0 0 40px var(--violet);
}

/* Zep Cash Info */
.zepcash{
  font-size:1.2rem;
  font-weight:500;
  color:var(--green);
  margin-top:6px;
}

/* MUSIC LIST */
.music-list{
  width:100%;
}
.track-card{
  background:rgba(255,255,255,.05);
  border-radius:12px;
  padding:12px;
  margin-bottom:12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  transition:.3s;
}
.track-card:hover{background:rgba(255,255,255,.12);}
.track-info{display:flex;align-items:center;gap:12px;}
.track-cover{width:50px;height:50px;border-radius:8px;object-fit:cover;}
.track-name{font-weight:500;}
.track-actions button{
  margin-left:6px;
  background:linear-gradient(90deg,var(--blue),var(--violet));
  border:none;color:#050015;padding:6px 12px;
  border-radius:999px;
  cursor:pointer;
  font-family:Orbitron;
  transition:.3s;
}
.track-actions button:hover{transform:scale(1.05);box-shadow:0 0 15px var(--blue),0 0 30px var(--violet);}
</style>
</head>
<body>

<header>
  <div class="brand">
    <img src="https://payhip.com/cdn-cgi/image/format=auto/https://pe56d.s3.amazonaws.com/o_1jfnua21qtu1vi2pfom33p641h.png" alt="Zep Swipe Logo">
    Campus Wave
  </div>
  <button class="home-btn" title="Home" onclick="location.href='index.html'">🏠</button>
</header>

<div class="dashboard-container">

  <!-- Zep Swipe Verification -->
  <div class="card">
    <h3>Zep Swipe Verification</h3>
    <button class="verify-btn" id="verifyBtn">Connect Zep Swipe</button>
    <div id="verifiedSticker" style="margin-top:10px;display:none;">✔ Verified ✅</div>
  </div>

  <!-- Zep Cash Info -->
  <div class="card">
    <h3>Zep Cash Balance</h3>
    <div class="zepcash" id="zepCash">$0.00</div>
  </div>

  <!-- Music List -->
  <div class="card">
    <h3>My Tracks</h3>
    <div class="music-list" id="musicList"></div>
  </div>

</div>

<script>
// ======== USER & WALLET =========
let walletAddress = localStorage.getItem('campusWaveWallet') || null;
let zepCashBalance = 50; // simulate starting balance

// ======== MOCK MUSIC DATA =========
let tracks = [
  {name:"Campus Anthem",cover:"https://via.placeholder.com/50",published:false},
  {name:"Uni Vibes",cover:"https://via.placeholder.com/50",published:false},
  {name:"Chill Beats",cover:"https://via.placeholder.com/50",published:false}
];

// ======== DOM ELEMENTS =========
const verifyBtn = document.getElementById('verifyBtn');
const verifiedSticker = document.getElementById('verifiedSticker');
const zepCash = document.getElementById('zepCash');
const musicList = document.getElementById('musicList');

// ======== DISPLAY ZEP CASH =========
function updateZepCash(){ zepCash.innerText = `$${zepCash.toFixed(2)}`; }
updateZepCash();

// ======== MUSIC LIST =========
function renderTracks(){
  musicList.innerHTML = '';
  tracks.forEach((track,i)=>{
    const card = document.createElement('div'); card.className='track-card';
    const info = document.createElement('div'); info.className='track-info';
    const img = document.createElement('img'); img.src=track.cover; img.className='track-cover';
    const name = document.createElement('div'); name.className='track-name'; name.innerText = track.name;
    info.appendChild(img); info.appendChild(name);
    const actions = document.createElement('div'); actions.className='track-actions';
    const publishBtn = document.createElement('button'); publishBtn.innerText='Publish'; 
    publishBtn.onclick = ()=>{
      if(!isVerified){
        alert('Verify your Zep Swipe account first!');
        return;
      }
      track.published=true;
      alert(`Track "${track.name}" published to Campus Chart!`);
      zepCashBalance += 5; // reward for publishing
      updateZepCash();
      renderTracks();
    };
    const tipBtn = document.createElement('button'); tipBtn.innerText='Tip';
    tipBtn.onclick=()=>{
      if(zepCashBalance>=1){
        zepCashBalance -= 1;
        alert(`You tipped 1 Zep Cash to ${track.name}`);
        updateZepCash();
      } else alert('Insufficient Zep Cash');
    };
    actions.appendChild(publishBtn); actions.appendChild(tipBtn);
    card.appendChild(info); card.appendChild(actions);
    musicList.appendChild(card);
  });
}
renderTracks();

// ======== ZEP SWIPE VERIFICATION =========
let isVerified = false;
verifyBtn.addEventListener('click',()=>{
  // Open Zep Swipe login in new tab
  const popup = window.open('https://www.zepswipe.com/login.html','zepSwipeLogin','width=500,height=600');
  // Poll for verification (simulate)
  const checkVerification = setInterval(()=>{
    const verified = localStorage.getItem('zepSwipeVerified')==='true';
    if(verified){
      isVerified=true;
      verifiedSticker.style.display='block';
      verifyBtn.style.display='none';
      alert('Zep Swipe Verified! You can now publish tracks.');
      clearInterval(checkVerification);
    }
  },1000);
});

// Simulate Zep Swipe verification for demo
if(localStorage.getItem('zepSwipeVerified')==='true'){
  isVerified=true;
  verifiedSticker.style.display='block';
  verifyBtn.style.display='none';
}
</script>

</body>
</html>
