<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campus Wave Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#070716;
color:white;
}

.container{
padding-bottom:140px;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 20px;
}

.logo{
font-weight:700;
font-size:20px;
background:linear-gradient(90deg,#00E5FF,#7B4DFF);
-webkit-background-clip:text;
color:transparent;
}

.logout{
font-size:22px;
cursor:pointer;
}

.glass{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(25px);
border-radius:22px;
box-shadow:0 0 30px rgba(0,229,255,0.25);
margin:20px;
padding:22px;
}

.balance{
font-size:40px;
font-weight:700;
}

.usd{
opacity:.7;
margin-top:5px;
}

.actions{
display:flex;
gap:10px;
margin-top:18px;
}

button{
padding:12px;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#00E5FF,#7B4DFF);
color:white;
font-weight:600;
flex:1;
}

.profile-card div{
margin-top:6px;
}

.verify{
color:#00E5FF;
}

.analytics-grid{
display:flex;
justify-content:space-between;
text-align:center;
margin-top:12px;
}

.history{
max-height:200px;
overflow:auto;
}

.tx{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
}

/* Player */

.player{
position:fixed;
bottom:60px;
left:0;
width:100%;
background:#0f0f2e;
display:flex;
align-items:center;
padding:12px;
gap:12px;
}

.player img{
width:50px;
height:50px;
border-radius:12px;
}

.track{
flex:1;
}

.play{
font-size:22px;
cursor:pointer;
}

/* Footer Nav */

footer{
position:fixed;
bottom:0;
width:100%;
height:60px;
background:#0b0b22;
display:flex;
justify-content:space-around;
align-items:center;
}

footer a{
color:white;
text-decoration:none;
font-size:13px;
text-align:center;
}

/* Modal */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#111133;
padding:25px;
border-radius:20px;
width:90%;
max-width:400px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:none;
background:#1a1a44;
color:white;
}

.copy{
background:#1a1a44;
padding:12px;
border-radius:10px;
margin-top:10px;
word-break:break-all;
}

</style>
</head>

<body>

<div class="container">

<header>

<div class="logo">Campus Wave</div>

<div class="logout" onclick="logout()">⎋</div>

</header>

<!-- Wallet -->

<div class="glass">

<div>Zep Cash Balance</div>

<div class="balance" id="balance">0 ZAC</div>

<div class="usd" id="usd">$0.00</div>

<div class="actions">

<button onclick="openSend()">Send</button>
<button onclick="openReceive()">Receive</button>

</div>

</div>

<!-- Profile -->

<div class="glass profile-card">

<b>Student Profile</b>

<div id="name">Name:</div>
<div id="country">Country:</div>
<div id="university">University:</div>

<div class="verify">✔ Zep Swipe Verified</div>

</div>

<!-- Creator dashboard -->

<div class="glass">

<b>Creator Payout Dashboard</b>

<div class="analytics-grid">

<div>
<div id="streams">0</div>
<small>Streams</small>
</div>

<div>
<div id="tips">0</div>
<small>Tips</small>
</div>

<div>
<div id="earnings">0 ZAC</div>
<small>Earnings</small>
</div>

</div>

</div>

<!-- Transactions -->

<div class="glass history">

<b>On-Chain Transactions</b>

<div id="txList"></div>

</div>

</div>

<!-- Mini Player -->

<div class="player">

<img src="https://picsum.photos/200">

<div class="track">

<div>Campus Radio</div>

<small>Live Student Mix</small>

</div>

<div class="play" onclick="togglePlay()">▶</div>

<audio id="audio"
src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

</div>

<!-- Footer Navigation -->

<footer>

<a href="upload.html">⬆<br>Upload</a>

<a href="discover.html">🔍<br>Discover</a>

<a href="campus-chart.html">📊<br>Charts</a>

<a href="radio.html">📡<br>Radio</a>

<a href="profile.html">👤<br>Profile</a>

</footer>

<!-- Send Modal -->

<div class="modal" id="sendModal">

<div class="modal-content">

<h3>Send ZAC</h3>

<input id="sendAddress" placeholder="Wallet Address">

<input id="sendAmount" placeholder="Amount">

<button onclick="sendZAC()">Send</button>

<button onclick="closeModal()">Cancel</button>

</div>

</div>

<!-- Receive Modal -->

<div class="modal" id="receiveModal">

<div class="modal-content">

<h3>Receive ZAC</h3>

<div class="copy" id="walletAddress"></div>

<button onclick="copyAddress()">Copy Address</button>

<button onclick="closeModal()">Close</button>

</div>

</div>

<script>

let provider
let signer
let userAddress

const contractAddress="0xA40F79dbeEE44AF9EC40d1D9b0e10EB1110546c1"

const abi=[
"function balanceOf(address owner) view returns (uint256)",
"function transfer(address to,uint amount) returns (bool)"
]

async function init(){

if(window.ethereum){

provider=new ethers.providers.Web3Provider(window.ethereum)

signer=provider.getSigner()

userAddress=await signer.getAddress()

document.getElementById("walletAddress").innerText=userAddress

loadBalance()

loadTransactions()

}

loadProfile()

}

async function loadBalance(){

const contract=new ethers.Contract(contractAddress,abi,provider)

let balance=await contract.balanceOf(userAddress)

balance=ethers.utils.formatUnits(balance,18)

document.getElementById("balance").innerText=parseFloat(balance).toFixed(2)+" ZAC"

let price=0.002

document.getElementById("usd").innerText="$"+(balance*price).toFixed(2)

}

async function sendZAC(){

const address=document.getElementById("sendAddress").value
const amount=document.getElementById("sendAmount").value

const contract=new ethers.Contract(contractAddress,abi,signer)

const tx=await contract.transfer(address,ethers.utils.parseUnits(amount,18))

await tx.wait()

alert("ZAC Sent")

closeModal()

loadBalance()

}

function openSend(){
document.getElementById("sendModal").style.display="flex"
}

function openReceive(){
document.getElementById("receiveModal").style.display="flex"
}

function closeModal(){
document.getElementById("sendModal").style.display="none"
document.getElementById("receiveModal").style.display="none"
}

function copyAddress(){

navigator.clipboard.writeText(userAddress)

alert("Address copied")

}

function togglePlay(){

const audio=document.getElementById("audio")

audio.paused?audio.play():audio.pause()

}

/* profile */

function loadProfile(){

let user=JSON.parse(localStorage.getItem("campusUser"))

if(user){

document.getElementById("name").innerText="Name: "+user.name
document.getElementById("country").innerText="Country: "+user.country
document.getElementById("university").innerText="University: "+user.university

}

}

/* tx simulation */

function loadTransactions(){

let html=""

for(let i=0;i<5;i++){

html+=`
<div class="tx">
<span>Tip Artist</span>
<span>${(Math.random()*10).toFixed(2)} ZAC</span>
</div>
`

}

document.getElementById("txList").innerHTML=html

}

/* logout */

function logout(){

window.location.href="index.html"

}

/* analytics */

document.getElementById("streams").innerText=Math.floor(Math.random()*6000)
document.getElementById("tips").innerText=Math.floor(Math.random()*300)
document.getElementById("earnings").innerText=(Math.random()*200).toFixed(2)+" ZAC"

init()

</script>

</body>
</html>
