<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave — Artist Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins:wght@300;400,500,600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#00f0ff;
  --violet:#9c4dff;
  --green:#00ff94;
  --yellow:#ffcc00;
  --bg:#050018;
  --glass:rgba(255,255,255,.08);
  --text-light:rgba(255,255,255,.85);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}
body{background:var(--bg);color:#fff;min-height:100vh;display:flex;flex-direction:column;}
header{
  display:flex;justify-content:space-between;align-items:center;padding:16px 20px;
  backdrop-filter:blur(12px);background:rgba(0,0,0,.35);border-bottom:1px solid rgba(255,255,255,.08);
}
header h1{font-family:Orbitron;font-size:1.5rem;background:linear-gradient(90deg,var(--blue),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
header button{padding:10px 16px;border:none;border-radius:999px;font-family:Orbitron;background:linear-gradient(90deg,var(--blue),var(--violet));color:#050015;cursor:pointer;transition:.3s;}
header button:hover{transform:translateY(-2px);box-shadow:0 0 15px var(--blue),0 0 30px var(--violet);}
.container{max-width:1200px;margin:20px auto;padding:16px;display:flex;flex-direction:column;gap:24px;}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;}
.card{background:var(--glass);padding:20px;border-radius:18px;border:1px solid rgba(255,255,255,.12);display:flex;flex-direction:column;gap:12px;transition:.3s;}
.card:hover{transform:translateY(-5px);box-shadow:0 0 30px var(--blue),0 0 50px var(--violet);}
.card h3{font-family:Orbitron;margin-bottom:8px;}
.card p{font-size:0.9rem;color:var(--text-light);}
.upload-btn{padding:12px 20px;border:none;border-radius:999px;font-family:Orbitron;background:linear-gradient(90deg,var(--blue),var(--violet));color:#050015;cursor:pointer;transition:.3s;}
.upload-btn:hover{transform:translateY(-2px);box-shadow:0 0 15px var(--blue),0 0 30px var(--violet);}
.audio-player{position:fixed;bottom:0;left:0;width:100%;background:var(--glass);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:12px 20px;gap:20px;z-index:999;border-top:1px solid rgba(255,255,255,.12);}
.audio-player audio{width:70%;border-radius:12px;}
.audio-player button{padding:8px 14px;border:none;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--violet));color:#050015;font-family:Orbitron;cursor:pointer;}
.alert{background:rgba(255,0,0,.3);padding:10px;border-radius:12px;margin-bottom:12px;display:none;text-align:center;font-weight:500;}
@media(max-width:600px){
  .cards{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<header>
  <h1>Campus Wave Artist Dashboard</h1>
  <button onclick="logout()">Logout</button>
</header>

<div class="container">

  <div class="alert" id="alertMsg"></div>

  <div class="card">
    <h3>Upload New Track</h3>
    <input type="file" id="trackInput" accept="audio/*">
    <button class="upload-btn" onclick="uploadTrack()">Upload</button>
  </div>

  <div class="cards" id="musicCards"></div>

</div>

<div class="audio-player" id="audioPlayer" style="display:none;">
  <audio id="player" controls></audio>
  <button id="tipBtn" onclick="tipArtist()">Tip Artist</button>
</div>

<script>
// === INIT USER ===
let currentUserId = localStorage.getItem("currentUserId");
let users = JSON.parse(localStorage.getItem("users")) || {};
if(!currentUserId || !users[currentUserId]){
  window.location.href="login.html";
}
let user = users[currentUserId];
if(!user.music) user.music=[];

// === ELEMENTS ===
const musicCards = document.getElementById("musicCards");
const alertMsg = document.getElementById("alertMsg");
const audioPlayer = document.getElementById("audioPlayer");
const player = document.getElementById("player");

// === FUNCTIONS ===
function renderMusic(){
  musicCards.innerHTML="";
  user.music.forEach((track, idx)=>{
    const div = document.createElement("div");
    div.className="card";
    div.innerHTML = `<h3>${track.name}</h3>
                     <p>Listeners: ${track.listeners || 0}</p>
                     <p>Tips: ${track.tips || 0} ZAC</p>
                     <button onclick="playTrack(${idx})">Play Track</button>`;
    musicCards.appendChild(div);
  });
}

function uploadTrack(){
  const fileInput = document.getElementById("trackInput");
  if(fileInput.files.length===0){
    alertMsg.style.display="block";
    alertMsg.innerText="Please select an audio file to upload.";
    return;
  }
  const file = fileInput.files[0];
  const trackName = file.name.split(".")[0];
  user.music.push({name:trackName,listeners:0,tips:0,url:URL.createObjectURL(file)});
  users[currentUserId]=user;
  localStorage.setItem("users",JSON.stringify(users));
  fileInput.value="";
  alertMsg.style.display="none";
  renderMusic();
}

function playTrack(idx){
  const track = user.music[idx];
  player.src = track.url;
  audioPlayer.style.display="flex";
  // increment listeners count
  track.listeners = (track.listeners || 0)+1;
  users[currentUserId]=user;
  localStorage.setItem("users",JSON.stringify(users));
  renderMusic();
}

function tipArtist(){
  alert("Tips will be enabled after Zep Cash presale launch!");
}

function logout(){
  localStorage.removeItem("currentUserId");
  window.location.href="login.html";
}

// INITIAL RENDER
renderMusic();
</script>

</body>
</html>
