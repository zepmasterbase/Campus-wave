<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave — Student Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#00f0ff;
  --violet:#9c4dff;
  --bg:radial-gradient(circle at 30% 10%, #050018, #00000c);
  --glass:rgba(255,255,255,0.08);
  --text-light:rgba(255,255,255,.85);
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}
body{background:var(--bg);color:#fff;min-height:100vh;display:flex;flex-direction:column;}
header{
  display:flex;justify-content:space-between;align-items:center;padding:16px 20px;
  backdrop-filter:blur(12px);background:rgba(0,0,0,.35);
  border-bottom:1px solid rgba(255,255,255,.08);
}
.brand{
  display:flex;align-items:center;gap:10px;
}
.brand span{
  font-family:Orbitron;
  font-size:1.4rem;
  background:linear-gradient(90deg,var(--blue),var(--violet));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.wallet-card{
  background:var(--glass);padding:16px;border-radius:18px;margin:16px;
  display:flex;justify-content:space-between;align-items:center;
  border:1px solid rgba(255,255,255,.12);
}
button{
  padding:12px 20px;border:none;border-radius:999px;font-family:Orbitron;
  background:linear-gradient(90deg,var(--blue),var(--violet));
  color:#050015;cursor:pointer;transition:.3s;
}
button:hover{
  transform:translateY(-2px);
  box-shadow:0 0 15px var(--blue),0 0 30px var(--violet);
}
.profile{
  display:flex;align-items:center;gap:12px;margin:16px;
}
.profile img{
  width:60px;height:60px;border-radius:50%;object-fit:cover;
  box-shadow:0 0 15px var(--blue),0 0 25px var(--violet);
}
.music-list{
  display:flex;flex-direction:column;gap:16px;margin:16px;
}
.music-card{
  background:var(--glass);padding:12px;border-radius:16px;display:flex;justify-content:space-between;align-items:center;
  border:1px solid rgba(255,255,255,.12);
  transition:.3s;cursor:pointer;
}
.music-card:hover{
  transform:scale(1.02);
  box-shadow:0 0 15px var(--blue),0 0 30px var(--violet);
}
.footer-player{
  position:fixed;bottom:0;left:0;width:100%;background:rgba(0,0,0,.9);
  padding:12px;display:flex;align-items:center;justify-content:space-between;
  backdrop-filter:blur(8px);border-top:1px solid rgba(255,255,255,.1);
}
.footer-player button{
  padding:8px 14px;border-radius:999px;
}
</style>
</head>
<body>

<header>
  <div class="brand"><span>Campus Wave</span></div>
  <button onclick="location.href='discover.html'">Discover</button>
</header>

<div class="profile">
  <img id="profileImage" src="" alt="Profile">
  <div>
    <h3 id="studentName">Student Name</h3>
    <p id="studentEmail" style="font-size:0.9rem;color:var(--text-light)">email@example.com</p>
  </div>
</div>

<div class="wallet-card">
  <div>Wallet Balance:</div>
  <div><span id="walletBalance">0 ZEP</span></div>
</div>

<div style="margin:16px;">
  <button onclick="uploadMusic()">Upload Music</button>
</div>

<h3 style="margin-left:16px;">Your Uploaded Tracks</h3>
<div class="music-list" id="musicList">
  <!-- Tracks dynamically loaded here -->
</div>

<!-- Footer Player -->
<div class="footer-player">
  <div id="currentTrack">No track playing</div>
  <button onclick="expandPlayer()">▶ Play</button>
</div>

<script>
// Load Zep Swipe student
const currentUserId = localStorage.getItem("currentUserId");
const users = JSON.parse(localStorage.getItem("users")) || {};
if(!currentUserId || !users[currentUserId]){
  window.location.href="login.html";
}
const currentUser = users[currentUserId];

// Populate profile
document.getElementById("studentName").innerText = currentUser.name;
document.getElementById("studentEmail").innerText = currentUser.email;
document.getElementById("profileImage").src = currentUser.profileImage || "https://via.placeholder.com/60";

// Populate wallet
document.getElementById("walletBalance").innerText = currentUser.walletBalance + " ZEP";

// Music Upload / List (localStorage simulation)
let uploadedMusic = currentUser.uploadedMusic || [];
function renderMusicList(){
  const list = document.getElementById("musicList");
  list.innerHTML="";
  uploadedMusic.forEach((track,i)=>{
    const div = document.createElement("div");
    div.className="music-card";
    div.innerHTML=`<div>${track.title} - ${track.genre}</div>
    <button onclick="tipArtist(${i})">💰 Tip</button>`;
    div.onclick = ()=>{playTrack(i)};
    list.appendChild(div);
  });
}
renderMusicList();

function uploadMusic(){
  const title = prompt("Enter track title");
  const genre = prompt("Enter genre");
  if(title && genre){
    const track = {title, genre};
    uploadedMusic.push(track);
    currentUser.uploadedMusic = uploadedMusic;
    users[currentUserId] = currentUser;
    localStorage.setItem("users",JSON.stringify(users));
    renderMusicList();
  }
}

function tipArtist(index){
  alert(`Simulated tip sent to ${currentUser.name} for ${uploadedMusic[index].title}`);
  currentUser.walletBalance += 1; // Zep Cash simulation
  document.getElementById("walletBalance").innerText = currentUser.walletBalance + " ZEP";
  users[currentUserId] = currentUser;
  localStorage.setItem("users",JSON.stringify(users));
}

// Footer player simulation
let currentPlayingIndex = null;
function playTrack(index){
  currentPlayingIndex = index;
  document.getElementById("currentTrack").innerText = uploadedMusic[index].title + " - " + uploadedMusic[index].genre;
}
function expandPlayer(){
  if(currentPlayingIndex===null) return alert("No track selected");
  window.location.href="player.html";
}
</script>
</body>
</html>
