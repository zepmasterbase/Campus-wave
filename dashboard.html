<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins&display=swap" rel="stylesheet">
<style>
:root{
  --cw-blue:#00f0ff;
  --cw-violet:#9c4dff;
  --glass:rgba(255,255,255,0.05);
  --bg:#070716;
  --text-light:rgba(255,255,255,.85);
  --card-radius:22px;
}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,Poppins,sans-serif;
  background:var(--bg);
  color:white;
}
.container{
  padding-bottom:180px;
}
/* Header */
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
}
.logo{
  font-weight:700;
  font-size:22px;
  background:linear-gradient(90deg,var(--cw-blue),var(--cw-violet));
  -webkit-background-clip:text;
  color:transparent;
}
.logout{
  font-size:22px;
  cursor:pointer;
  transition:.3s;
}
.logout:hover{
  transform:scale(1.1);
}
/* Glass cards */
.glass{
  background:var(--glass);
  backdrop-filter:blur(25px);
  border-radius:var(--card-radius);
  box-shadow:0 0 40px rgba(0,229,255,.25),0 0 60px rgba(123,77,255,.15);
  margin:20px;
  padding:24px;
  transition:.3s;
}
.glass:hover{
  box-shadow:0 0 50px rgba(0,229,255,.35),0 0 70px rgba(123,77,255,.25);
}
.balance{
  font-size:44px;
  font-weight:700;
}
.usd{
  opacity:.7;
  margin-top:6px;
}
.actions{
  display:flex;
  gap:12px;
  margin-top:18px;
}
button{
  padding:12px;
  border:none;
  border-radius:16px;
  background:linear-gradient(45deg,var(--cw-blue),var(--cw-violet));
  color:white;
  font-weight:600;
  flex:1;
  cursor:pointer;
  transition:.3s;
}
button:hover{
  transform:translateY(-2px);
  box-shadow:0 0 20px var(--cw-blue),0 0 40px var(--cw-violet);
}
/* Profile card */
.profile-card div{
  margin-top:8px;
  font-size:16px;
}
.verify{
  color:#00f0ff;
  font-weight:700;
  margin-top:6px;
}
/* Analytics grid */
.analytics-grid{
  display:flex;
  justify-content:space-between;
  text-align:center;
  margin-top:12px;
}
.history{
  max-height:200px;
  overflow:auto;
}
.tx{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
  font-size:14px;
}
/* Player */
.player{
  position:fixed;
  bottom:60px;
  left:0;
  width:100%;
  background:#0f0f2e;
  display:flex;
  align-items:center;
  padding:12px;
  gap:12px;
  border-top:1px solid rgba(255,255,255,0.1);
}
.player img{
  width:50px;
  height:50px;
  border-radius:12px;
}
.track{
  flex:1;
}
.play{
  font-size:22px;
  cursor:pointer;
}
/* Footer */
footer{
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  background:#0b0b22;
  display:flex;
  justify-content:space-around;
  align-items:center;
}
footer a{
  color:white;
  text-decoration:none;
  font-size:13px;
  text-align:center;
}
/* Modal */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
  z-index:1000;
}
.modal-content{
  background:#111133;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:400px;
  text-align:center;
}
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:#1a1a44;
  color:white;
}
.copy{
  background:#1a1a44;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  word-break:break-all;
}
</style>
</head>
<body>
<div class="container">
<header>
  <div class="logo">Campus Wave</div>
  <div class="logout" onclick="logout()">⎋</div>
</header>

<!-- Wallet Balance -->
<div class="glass">
  <div>Zep Cash Balance</div>
  <div class="balance" id="balance">0 ZAC</div>
  <div class="usd" id="usd">$0.00</div>
  <div class="actions">
    <button onclick="openSend()">Send</button>
    <button onclick="openReceive()">Receive</button>
  </div>
</div>

<!-- Profile -->
<div class="glass profile-card">
  <b>Student Profile</b>
  <div id="name">Name: </div>
  <div id="country">Country: </div>
  <div id="university">University: </div>
  <div class="verify">✔ Zep Swipe Verified</div>
</div>

<!-- Creator Dashboard -->
<div class="glass">
  <b>Creator Payout Dashboard</b>
  <div class="analytics-grid">
    <div>
      <div id="streams">0</div>
      <small>Streams</small>
    </div>
    <div>
      <div id="tips">0</div>
      <small>Tips</small>
    </div>
    <div>
      <div id="earnings">0 ZAC</div>
      <small>Earnings</small>
    </div>
  </div>
</div>

<!-- Transactions -->
<div class="glass history">
  <b>On-Chain Transactions</b>
  <div id="txList"></div>
</div>
</div>

<!-- Mini Player -->
<div class="player">
  <img src="https://picsum.photos/200" alt="Track Image">
  <div class="track">
    <div>Campus Radio</div>
    <small>Live Student Mix</small>
  </div>
  <div class="play" onclick="togglePlay()">▶</div>
  <audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
</div>

<!-- Footer -->
<footer>
  <a href="upload.html">⬆<br>Upload</a>
  <a href="discover.html">🔍<br>Discover</a>
  <a href="campus-chart.html">📊<br>Charts</a>
  <a href="radio.html">📡<br>Radio</a>
  <a href="profile.html">👤<br>Profile</a>
</footer>

<!-- Send Modal -->
<div class="modal" id="sendModal">
  <div class="modal-content">
    <h3>Send ZAC</h3>
    <input id="sendAddress" placeholder="Wallet Address">
    <input id="sendAmount" placeholder="Amount">
    <button onclick="sendZAC()">Send</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- Receive Modal -->
<div class="modal" id="receiveModal">
  <div class="modal-content">
    <h3>Receive ZAC</h3>
    <div class="copy" id="walletAddress"></div>
    <button onclick="copyAddress()">Copy Address</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
let provider, signer, userAddress
const contractAddress="0xA40F79dbeEE44AF9EC40d1D9b0e10EB1110546c1"
const abi=[
"function balanceOf(address owner) view returns (uint256)",
"function transfer(address to,uint amount) returns (bool)"
]

// ===== INIT =====
async function init(){
  const campusUser = JSON.parse(localStorage.getItem("currentUser"))
  if(!campusUser){
    window.location.href="login.html"
    return
  }

  // Fill profile automatically
  document.getElementById("name").innerText="Name: "+campusUser.name
  document.getElementById("country").innerText="Country: "+campusUser.country
  document.getElementById("university").innerText="University: "+campusUser.university

  if(window.ethereum){
    provider=new ethers.providers.Web3Provider(window.ethereum)
    signer=provider.getSigner()
    userAddress=campusUser.walletAddress || await signer.getAddress()
    document.getElementById("walletAddress").innerText=userAddress
    loadBalance()
  }

  loadTransactions()
  updateAnalytics()
}

// ===== BALANCE =====
async function loadBalance(){
  const contract=new ethers.Contract(contractAddress,abi,provider)
  let balance=await contract.balanceOf(userAddress)
  balance=ethers.utils.formatUnits(balance,18)
  document.getElementById("balance").innerText=parseFloat(balance).toFixed(2)+" ZAC"
  let price=0.002 // live price simulation
  document.getElementById("usd").innerText="$"+(balance*price).toFixed(2)
}

// ===== SEND =====
async function sendZAC(){
  const address=document.getElementById("sendAddress").value
  const amount=document.getElementById("sendAmount").value
  if(!address || !amount) return alert("Enter address & amount")
  const contract=new ethers.Contract(contractAddress,abi,signer)
  const tx=await contract.transfer(address,ethers.utils.parseUnits(amount,18))
  await tx.wait()
  alert("ZAC Sent")
  closeModal()
  loadBalance()
}

// ===== MODALS =====
function openSend(){document.getElementById("sendModal").style.display="flex"}
function openReceive(){document.getElementById("receiveModal").style.display="flex"}
function closeModal(){document.getElementById("sendModal").style.display="none";document.getElementById("receiveModal").style.display="none"}
function copyAddress(){navigator.clipboard.writeText(userAddress);alert("Address copied")}

// ===== PLAYER =====
function togglePlay(){const audio=document.getElementById("audio"); audio.paused?audio.play():audio.pause()}

// ===== TRANSACTIONS SIMULATION =====
function loadTransactions(){
  let html=""
  for(let i=0;i<5;i++){
    html+=`<div class="tx"><span>Tip Artist</span><span>${(Math.random()*10).toFixed(2)} ZAC</span></div>`
  }
  document.getElementById("txList").innerHTML=html
}

// ===== LOGOUT =====
function logout(){localStorage.removeItem("currentUser");window.location.href="login.html"}

// ===== ANALYTICS SIMULATION =====
function updateAnalytics(){
  document.getElementById("streams").innerText=Math.floor(Math.random()*6000)
  document.getElementById("tips").innerText=Math.floor(Math.random()*300)
  document.getElementById("earnings").innerText=(Math.random()*200).toFixed(2)+" ZAC"
}

init()
</script>
</body>
</html>
