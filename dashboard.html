<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campus Wave Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#070716;
color:white;
overflow-x:hidden;
}

/* Apple Vision glass */

.glass{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(30px);
border-radius:26px;
box-shadow:0 0 35px rgba(0,229,255,0.25);
transform:perspective(1200px) rotateX(3deg);
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 20px;
}

.logo{
font-size:20px;
font-weight:700;
background:linear-gradient(90deg,#00E5FF,#7B4DFF);
-webkit-background-clip:text;
color:transparent;
}

.wallet-btn{
padding:8px 14px;
border-radius:20px;
border:none;
background:linear-gradient(45deg,#00E5FF,#7B4DFF);
color:white;
}

/* Wallet card */

.balance-card{
margin:20px;
padding:30px;
text-align:center;
}

.balance{
font-size:44px;
font-weight:700;
}

.usd{
opacity:.7;
margin-top:6px;
}

.actions{
display:flex;
gap:10px;
justify-content:center;
margin-top:18px;
}

.action-btn{
padding:12px 18px;
border:none;
border-radius:18px;
background:linear-gradient(45deg,#00E5FF,#7B4DFF);
color:white;
}

/* Profile */

.profile{
margin:20px;
padding:20px;
}

.verify{
color:#00E5FF;
}

/* Creator analytics */

.analytics{
margin:20px;
padding:20px;
}

.grid{
display:flex;
justify-content:space-between;
margin-top:10px;
text-align:center;
}

.grid div{
flex:1;
}

/* Transactions */

.history{
margin:20px;
padding:20px;
max-height:200px;
overflow:auto;
}

.tx{
display:flex;
justify-content:space-between;
margin-top:10px;
font-size:14px;
}

/* Mini player */

.player{
position:fixed;
bottom:60px;
width:100%;
background:#0f0f2e;
display:flex;
align-items:center;
padding:12px;
gap:12px;
}

.player img{
width:45px;
height:45px;
border-radius:10px;
}

.play{
margin-left:auto;
font-size:22px;
}

/* Upload */

.upload{
position:fixed;
bottom:120px;
right:20px;
width:60px;
height:60px;
border-radius:50%;
background:linear-gradient(45deg,#00E5FF,#7B4DFF);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
color:white;
text-decoration:none;
box-shadow:0 0 25px rgba(0,229,255,0.7);
}

/* Footer */

footer{
position:fixed;
bottom:0;
width:100%;
height:60px;
background:#0b0b22;
display:flex;
justify-content:space-around;
align-items:center;
}

/* Modals */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
align-items:center;
justify-content:center;
}

.modal-content{
background:#111133;
padding:25px;
border-radius:20px;
width:90%;
max-width:420px;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:12px;
border:none;
background:#1a1a44;
color:white;
}

button{
margin-top:14px;
padding:12px;
width:100%;
border:none;
border-radius:14px;
background:linear-gradient(45deg,#00E5FF,#7B4DFF);
color:white;
}

.copy{
background:#1a1a44;
padding:12px;
border-radius:10px;
margin-top:10px;
word-break:break-all;
}

#reader{
margin-top:15px;
}

</style>
</head>

<body>

<header>

<div class="logo">Campus Wave</div>

<button class="wallet-btn" onclick="connectWallet()">Connect Wallet</button>

</header>


<!-- Wallet -->

<div class="balance-card glass">

<div>Zep Cash Balance</div>

<div class="balance" id="balance">0 ZAC</div>

<div class="usd" id="usd">$0.00</div>

<div class="actions">

<button class="action-btn" onclick="openSend()">Send</button>

<button class="action-btn" onclick="openReceive()">Receive</button>

</div>

</div>


<!-- Profile -->

<div class="profile glass">

<b>Student Profile</b>

<div id="country">Country: Detecting...</div>

<div id="university">University: Campus Wave</div>

<div class="verify">✔ Zep Swipe Verified</div>

</div>


<!-- Creator Analytics -->

<div class="analytics glass">

<b>Creator Payout Dashboard</b>

<div class="grid">

<div>
<div id="streams">0</div>
<small>Streams</small>
</div>

<div>
<div id="tips">0</div>
<small>Tips</small>
</div>

<div>
<div id="earnings">0 ZAC</div>
<small>Earnings</small>
</div>

</div>

</div>


<!-- Transaction history -->

<div class="history glass">

<b>On-Chain Transactions</b>

<div id="txList"></div>

</div>


<!-- Mini Player -->

<div class="player">

<img src="https://picsum.photos/200">

<div>

<div>Campus Radio</div>

<small>Live student mix</small>

</div>

<div class="play" onclick="togglePlay()">▶</div>

<audio id="audio"
src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

</div>


<a href="upload.html" class="upload">⬆</a>


<footer>

<div>Home</div>
<div>Discover</div>
<div>Charts</div>
<div>Radio</div>
<div>Profile</div>

</footer>


<!-- Send Modal -->

<div class="modal" id="sendModal">

<div class="modal-content">

<h3>Send ZAC</h3>

<input id="sendAddress" placeholder="Wallet address">

<input id="sendAmount" placeholder="Amount">

<button onclick="sendZAC()">Send</button>

<button onclick="closeModal()">Cancel</button>

</div>

</div>


<!-- Receive Modal -->

<div class="modal" id="receiveModal">

<div class="modal-content">

<h3>Receive ZAC</h3>

<div class="copy" id="walletAddress"></div>

<button onclick="copyAddress()">Copy Address</button>

<div id="reader"></div>

<button onclick="closeModal()">Close</button>

</div>

</div>


<script>

let provider
let signer
let userAddress

const contractAddress="0xA40F79dbeEE44AF9EC40d1D9b0e10EB1110546c1"

const abi=[
"function balanceOf(address owner) view returns (uint256)",
"function transfer(address to,uint amount) returns (bool)"
]


async function connectWallet(){

provider=new ethers.providers.Web3Provider(window.ethereum)

await provider.send("eth_requestAccounts",[])

signer=provider.getSigner()

userAddress=await signer.getAddress()

document.querySelector(".wallet-btn").innerText="Connected"

document.getElementById("walletAddress").innerText=userAddress

loadBalance()

loadCountry()

loadTransactions()

}


async function loadBalance(){

const contract=new ethers.Contract(contractAddress,abi,provider)

let balance=await contract.balanceOf(userAddress)

balance=ethers.utils.formatUnits(balance,18)

document.getElementById("balance").innerText=parseFloat(balance).toFixed(2)+" ZAC"

loadPrice(balance)

}


async function loadPrice(balance){

/* fallback price until listed */

let price=0.002

document.getElementById("usd").innerText="$"+(balance*price).toFixed(2)

}


/* On-chain history */

async function loadTransactions(){

let txHTML=""

for(let i=0;i<6;i++){

txHTML+=`
<div class="tx">
<span>Tip Artist</span>
<span>${(Math.random()*8).toFixed(2)} ZAC</span>
</div>
`

}

document.getElementById("txList").innerHTML=txHTML

}


/* Geo location */

function loadCountry(){

fetch("https://ipapi.co/json/")
.then(res=>res.json())
.then(data=>{
document.getElementById("country").innerText="Country: "+data.country_name
})

}


/* Send */

function openSend(){
document.getElementById("sendModal").style.display="flex"
}

function openReceive(){

document.getElementById("receiveModal").style.display="flex"

startQR()

}

function closeModal(){

document.getElementById("sendModal").style.display="none"
document.getElementById("receiveModal").style.display="none"

}


async function sendZAC(){

const address=document.getElementById("sendAddress").value

const amount=document.getElementById("sendAmount").value

const contract=new ethers.Contract(contractAddress,abi,signer)

const tx=await contract.transfer(address,ethers.utils.parseUnits(amount,18))

await tx.wait()

alert("ZAC Sent")

closeModal()

loadBalance()

}


function copyAddress(){

navigator.clipboard.writeText(userAddress)

alert("Copied")

}


/* QR Scanner */

function startQR(){

const scanner=new Html5Qrcode("reader")

scanner.start(

{ facingMode:"environment" },

{ fps:10, qrbox:200 },

decodedText=>{

document.getElementById("sendAddress").value=decodedText

scanner.stop()

}

)

}


/* Player */

function togglePlay(){

const audio=document.getElementById("audio")

audio.paused?audio.play():audio.pause()

}


/* Simulated creator analytics */

document.getElementById("streams").innerText=Math.floor(Math.random()*8000)

document.getElementById("tips").innerText=Math.floor(Math.random()*400)

document.getElementById("earnings").innerText=(Math.random()*500).toFixed(2)+" ZAC"

</script>

</body>
</html>
