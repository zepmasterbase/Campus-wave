<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.min.js"></script>
<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#070716;
  color:white;
}
.container{
  padding-bottom:160px;
}
header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 20px;
}
.logo{
  font-weight:700;
  font-size:22px;
  background:linear-gradient(90deg,#00E5FF,#7B4DFF);
  -webkit-background-clip:text;
  color:transparent;
}
.logout{
  font-size:22px;
  cursor:pointer;
}

/* Glass card style */
.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(25px);
  border-radius:22px;
  box-shadow:0 0 30px rgba(0,229,255,0.25);
  margin:20px;
  padding:22px;
}
.balance{
  font-size:38px;
  font-weight:700;
}
.usd{
  opacity:.7;
  margin-top:5px;
}
.actions{
  display:flex;
  gap:10px;
  margin-top:18px;
}
button{
  padding:12px;
  border:none;
  border-radius:14px;
  background:linear-gradient(45deg,#00E5FF,#7B4DFF);
  color:white;
  font-weight:600;
  flex:1;
  cursor:pointer;
  transition:.3s;
}
button:hover{
  transform:translateY(-2px);
  box-shadow:0 0 15px #00E5FF,0 0 30px #7B4DFF;
}

/* Profile Card */
.profile-card div{
  margin-top:6px;
}
.verify{
  color:#00E5FF;
  font-weight:bold;
}

/* Player */
.player{
  position:fixed;
  bottom:60px;
  left:0;
  width:100%;
  background:#0f0f2e;
  display:flex;
  align-items:center;
  padding:12px;
  gap:12px;
}
.player img{
  width:50px;
  height:50px;
  border-radius:12px;
}
.track{
  flex:1;
}
.play{
  font-size:22px;
  cursor:pointer;
}
.waveform{
  height:4px;
  background:linear-gradient(90deg,#00E5FF,#7B4DFF);
  margin-top:4px;
  border-radius:2px;
  animation:wave 1s infinite alternate;
}
@keyframes wave{
  0%{transform:scaleX(0.8);}
  50%{transform:scaleX(1);}
  100%{transform:scaleX(0.9);}
}

/* Footer Nav */
footer{
  position:fixed;
  bottom:0;
  width:100%;
  height:60px;
  background:#0b0b22;
  display:flex;
  justify-content:space-around;
  align-items:center;
}
footer a{
  color:white;
  text-decoration:none;
  font-size:13px;
  text-align:center;
}

/* Modal */
.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  align-items:center;
  justify-content:center;
}
.modal-content{
  background:#111133;
  padding:25px;
  border-radius:20px;
  width:90%;
  max-width:400px;
}
input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:12px;
  border:none;
  background:#1a1a44;
  color:white;
}
.copy{
  background:#1a1a44;
  padding:12px;
  border-radius:10px;
  margin-top:10px;
  word-break:break-all;
}
</style>
</head>
<body>

<div class="container">
<header>
  <div class="logo">Campus Wave</div>
  <div class="logout" onclick="logout()">⎋</div>
</header>

<!-- Wallet Balance -->
<div class="glass">
  <div>Zep Cash Balance</div>
  <div class="balance" id="balance">0 ZAC</div>
  <div class="usd" id="usd">$0.00</div>
  <div class="actions">
    <button onclick="openSend()">Send</button>
    <button onclick="openReceive()">Receive</button>
  </div>
</div>

<!-- Profile -->
<div class="glass profile-card">
  <b>Student Profile</b>
  <div id="name">Name: </div>
  <div id="country">Country: </div>
  <div id="university">University: </div>
  <div class="verify">✔ Verified Artist</div>
</div>

<!-- Transactions History -->
<div class="glass history">
  <b>On-Chain Transactions</b>
  <div id="txList"></div>
</div>
</div>

<!-- Mini Player -->
<div class="player">
  <img src="https://picsum.photos/200">
  <div class="track">
    <div id="nowPlaying">Campus Radio</div>
    <div class="waveform"></div>
  </div>
  <div class="play" onclick="togglePlay()">▶</div>
  <audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
</div>

<!-- Footer Navigation -->
<footer>
  <a href="upload.html">⬆<br>Upload</a>
  <a href="discover.html">🔍<br>Discover</a>
  <a href="campus-chart.html">📊<br>Charts</a>
  <a href="radio.html">📡<br>Radio</a>
  <a href="profile.html">👤<br>Profile</a>
</footer>

<!-- Send Modal -->
<div class="modal" id="sendModal">
  <div class="modal-content">
    <h3>Send ZAC</h3>
    <input id="sendAddress" placeholder="Wallet Address">
    <input id="sendAmount" placeholder="Amount">
    <button onclick="sendZAC()">Send</button>
    <button onclick="closeModal()">Cancel</button>
  </div>
</div>

<!-- Receive Modal -->
<div class="modal" id="receiveModal">
  <div class="modal-content">
    <h3>Receive ZAC</h3>
    <div class="copy" id="walletAddress"></div>
    <button onclick="copyAddress()">Copy Address</button>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>
let provider, signer, userAddress;
const contractAddress="0xA40F79dbeEE44AF9EC40d1D9b0e10EB1110546c1";
const abi=[
  "function balanceOf(address owner) view returns (uint256)",
  "function transfer(address to,uint amount) returns (bool)"
];

async function init(){
  if(typeof window.ethereum==="undefined"){
    alert("MetaMask/Base wallet not detected.");
    return;
  }
  provider=new ethers.providers.Web3Provider(window.ethereum);
  signer=provider.getSigner();
  userAddress=await signer.getAddress();
  document.getElementById("walletAddress").innerText=userAddress;
  
  loadBalance();
  loadTransactions();
  loadProfile();
}

// Load ZAC Balance
async function loadBalance(){
  const contract=new ethers.Contract(contractAddress,abi,provider);
  let balance=await contract.balanceOf(userAddress);
  balance=ethers.utils.formatUnits(balance,18);
  document.getElementById("balance").innerText=parseFloat(balance).toFixed(2)+" ZAC";
  let price=0.002; // example price in USD
  document.getElementById("usd").innerText="$"+(balance*price).toFixed(2);
}

// Send ZAC
async function sendZAC(){
  const address=document.getElementById("sendAddress").value;
  const amount=document.getElementById("sendAmount").value;
  if(!address || !amount){alert("Fill all fields"); return;}
  const contract=new ethers.Contract(contractAddress,abi,signer);
  const tx=await contract.transfer(address,ethers.utils.parseUnits(amount,18));
  await tx.wait();
  alert("ZAC Sent!");
  closeModal();
  loadBalance();
}

function openSend(){document.getElementById("sendModal").style.display="flex";}
function openReceive(){document.getElementById("receiveModal").style.display="flex";}
function closeModal(){document.getElementById("sendModal").style.display="none"; document.getElementById("receiveModal").style.display="none";}
function copyAddress(){navigator.clipboard.writeText(userAddress); alert("Address copied!");}

// Mini Player
function togglePlay(){
  const audio=document.getElementById("audio");
  audio.paused?audio.play():audio.pause();
}

// Load profile info
function loadProfile(){
  const user=JSON.parse(localStorage.getItem("campusWalletProfile")) || {};
  document.getElementById("name").innerText="Name: "+(user.name||"Student");
  document.getElementById("country").innerText="Country: "+(user.country||"Unknown");
  document.getElementById("university").innerText="University: "+(user.university||"Unknown");
}

// Transactions simulation
function loadTransactions(){
  let html="";
  for(let i=0;i<5;i++){
    html+=`<div class="tx"><span>Tip Artist</span><span>${(Math.random()*10).toFixed(2)} ZAC</span></div>`;
  }
  document.getElementById("txList").innerHTML=html;
}

// Logout
function logout(){window.location.href="login.html";}

init();
</script>

</body>
</html>
