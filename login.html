<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave — Login with Zep Swipe</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins&display=swap" rel="stylesheet">
<style>
:root{
  --cw-blue:#00f0ff;
  --cw-violet:#9c4dff;
  --bg:radial-gradient(circle at 30% 10%, #050018, #00000c);
  --glass:rgba(255,255,255,0.08);
  --text-light:rgba(255,255,255,.85);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:var(--bg);color:#fff;}
.card{width:100%;max-width:420px;background:var(--glass);padding:28px;border-radius:18px;box-shadow:0 0 30px rgba(0,240,255,.25);animation:pulse 2s infinite;text-align:center;}
@keyframes pulse{
  0%{box-shadow:0 0 20px rgba(0,240,255,.25),0 0 40px rgba(156,77,255,.25);}
  50%{box-shadow:0 0 30px rgba(0,240,255,.35),0 0 60px rgba(156,77,255,.35);}
  100%{box-shadow:0 0 20px rgba(0,240,255,.25),0 0 40px rgba(156,77,255,.25);}
}
h1{font-family:Orbitron;text-align:center;margin-bottom:24px;background:linear-gradient(90deg,var(--cw-blue),var(--cw-violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
button{width:100%;padding:14px;border:none;border-radius:999px;font-family:Orbitron;background:linear-gradient(90deg,var(--cw-blue),var(--cw-violet));color:#050015;cursor:pointer;transition:.3s;margin-top:12px;}
button:hover{transform:translateY(-2px);box-shadow:0 0 15px var(--cw-blue),0 0 30px var(--cw-violet);}
</style>
</head>
<body>

<div class="card">
  <h1>Campus Wave Login</h1>
  <p>Login with your <strong>Zep Swipe</strong> account to access Campus Wave.</p>
  <button id="zepLoginBtn">Login with Zep Swipe</button>
</div>

<script>
// ======= CONFIG =======
const DASHBOARD_URL = "dashboard.html";
const ZEP_SWIPE_LOGIN = "https://www.zepswipe.com/login.html";

// ======= STATE =======
let currentUser = null;

// ======= LOGIN FLOW =======
document.getElementById("zepLoginBtn").addEventListener("click",()=>{
  // Step 1: Redirect to Zep Swipe login
  window.location.href = ZEP_SWIPE_LOGIN + "?redirect_back=" + encodeURIComponent(window.location.href);
});

// ======= SIMULATE RETURN FROM ZEP SWIPE LOGIN =======
// Campus Wave receives Zep Swipe login info via query string (for demo)
function simulateZepSwipeLogin(){
  // Extract query string "user" param (simulating logged in Zep Swipe user)
  const urlParams = new URLSearchParams(window.location.search);
  const userEmail = urlParams.get("user") || "student@example.com";
  
  if(userEmail){
    // Treat all users as verified
    currentUser = {
      name: userEmail.split("@")[0],
      email: userEmail,
      verified: true,
      country: "Unknown",
      university: "Unknown",
      walletAddress: ""
    };
    localStorage.setItem("currentUser", JSON.stringify(currentUser));
    // Step 2: Prompt wallet connection
    connectWallet();
  }
}

// ======= WALLET CONNECT =======
async function connectWallet(){
  if(window.ethereum){
    try{
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      currentUser.walletAddress = accounts[0];
      localStorage.setItem("currentUser", JSON.stringify(currentUser));
      alert("Wallet connected! Redirecting to Dashboard...");
      window.location.href = DASHBOARD_URL;
    }catch(err){
      alert("Wallet connection rejected. Please try again.");
    }
  }else{
    alert("Metamask or Base wallet not detected. Please install a wallet.");
  }
}

// ======= INIT =======
window.onload = ()=>{
  // If user already logged in locally, skip Zep Swipe login
  const storedUser = JSON.parse(localStorage.getItem("currentUser"));
  if(storedUser && storedUser.walletAddress){
    window.location.href = DASHBOARD_URL;
  }else{
    // Otherwise check if returned from Zep Swipe login
    simulateZepSwipeLogin();
  }
}
</script>

</body>
</html>
