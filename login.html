<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins:wght@300;400,500,600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#00f0ff;
  --violet:#9c4dff;
  --green:#00ff94;
  --yellow:#ffcc00;
  --bg:#050018;
  --glass:rgba(255,255,255,.08);
  --text-light:rgba(255,255,255,.85);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}
body{background:var(--bg);color:#fff;display:flex;justify-content:center;align-items:center;height:100vh;}
.login-container{background:var(--glass);backdrop-filter:blur(12px);padding:40px;border-radius:20px;width:95%;max-width:400px;box-shadow:0 0 30px rgba(0,255,255,.2);}
.login-container h1{font-family:Orbitron;font-size:2rem;text-align:center;background:linear-gradient(90deg,var(--blue),var(--violet));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:30px;}
.input-group{margin-bottom:20px;position:relative;}
.input-group label{display:block;margin-bottom:6px;color:var(--text-light);}
.input-group input{width:100%;padding:12px 16px;border-radius:12px;border:none;background:rgba(255,255,255,.05);color:#fff;font-size:1rem;outline:none;}
.input-group input::placeholder{color:rgba(255,255,255,.5);}
button{width:100%;padding:14px;border:none;border-radius:999px;font-family:Orbitron;background:linear-gradient(90deg,var(--blue),var(--violet));color:#050015;font-size:1rem;cursor:pointer;transition:.3s;}
button:hover{transform:translateY(-2px);box-shadow:0 0 15px var(--blue),0 0 30px var(--violet);}
.alert{background:rgba(255,0,0,.3);padding:10px;border-radius:12px;margin-bottom:20px;display:none;text-align:center;font-weight:500;}
.footer{margin-top:20px;text-align:center;font-size:0.9rem;color:rgba(255,255,255,.5);}
.footer a{color:var(--blue);text-decoration:none;}
</style>
</head>
<body>

<div class="login-container">
  <h1>Campus Wave</h1>
  <div class="alert" id="alertMsg"></div>
  <div class="input-group">
    <label for="email">Email Address</label>
    <input type="email" id="email" placeholder="Enter your Zep Swipe email">
  </div>
  <div class="input-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter your Zep Swipe password">
  </div>
  <button onclick="loginUser()">Login with Zep Swipe</button>
  <div class="footer">
    Not a Zep Swipe user? <a href="https://www.zepswipe.com" target="_blank">Sign up</a>
  </div>
</div>

<script>
// LOGIN USING ZEP SWIPE LOCALSTORAGE
function loginUser(){
  const email = document.getElementById("email").value.trim().toLowerCase();
  const password = document.getElementById("password").value.trim();
  const alertMsg = document.getElementById("alertMsg");

  let users = JSON.parse(localStorage.getItem("users")) || {};
  let foundUser = null;

  // Loop through users to find match
  Object.values(users).forEach(user => {
    if(user.email && user.email.toLowerCase() === email && user.password === password){
      foundUser = user;
    }
  });

  if(!foundUser){
    alertMsg.style.display="block";
    alertMsg.innerText = "Invalid Zep Swipe credentials. Please try again.";
    return;
  }

  // Successful login
  localStorage.setItem("currentUserId", foundUser.id);
  window.location.href = "dashboard.html"; // Redirect to Campus Wave dashboard
}
</script>

</body>
</html>
