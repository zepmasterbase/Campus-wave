<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave Login</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#070716;color:white;display:flex;justify-content:center;align-items:center;height:100vh;}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(25px);padding:30px;border-radius:22px;text-align:center;box-shadow:0 0 30px rgba(0,229,255,0.25);}
button{padding:14px 20px;border:none;border-radius:12px;background:linear-gradient(90deg,#00E5FF,#7B4DFF);color:#050015;font-weight:700;cursor:pointer;transition:.3s;}
button:hover{transform:translateY(-2px);box-shadow:0 0 15px #00E5FF,0 0 30px #7B4DFF;}
</style>
</head>
<body>
<div class="card">
  <h2>Connect Wallet to Campus Wave</h2>
  <button onclick="connectWallet()">Connect Base / MetaMask Wallet</button>
</div>

<script>
async function connectWallet(){
  if(typeof window.ethereum === "undefined"){
    alert("Base Network / MetaMask not detected. Please install wallet.");
    return;
  }
  try{
    // Request account connection
    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
    const walletAddress = accounts[0];
    
    // Save profile in localStorage (all users treated as verified)
    const profile = {
      name: "Student",
      country: "Unknown",
      university: "Unknown",
      wallet: walletAddress,
      verified: true
    };
    localStorage.setItem("campusWalletProfile", JSON.stringify(profile));
    
    // Redirect to dashboard
    window.location.href = "dashboard.html";
  }catch(err){
    alert("Connection failed: "+err.message);
  }
}
</script>
</body>
</html>
