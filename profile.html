<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave | Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins,sans-serif;
}

body{
  background:#0a0a0f;
  color:white;
  min-height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:20px 40px;
  background:linear-gradient(90deg,#12121a,#0b0b12);
  border-bottom:1px solid rgba(255,255,255,.1);
}

.logo{
  font-size:22px;
  font-weight:600;
  color:#00ffd5;
  cursor:pointer;
}

.header-btn{
  background:linear-gradient(135deg,#00ffd5,#6a5cff);
  color:black;
  border:none;
  padding:10px 18px;
  border-radius:999px;
  cursor:pointer;
  transition:.3s;
}

.header-btn:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00ffd5,0 0 25px #6a5cff;
}

.container{
  max-width:900px;
  margin:30px auto;
  padding:20px;
  display:flex;
  flex-direction:column;
  gap:30px;
}

/* PROFILE CARD */
.profile-card{
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:30px;
  display:flex;
  gap:25px;
  flex-wrap:wrap;
  align-items:center;
}

.profile-card img{
  width:120px;
  height:120px;
  border-radius:50%;
  border:3px solid #00ffd5;
  object-fit:cover;
}

.profile-info{
  flex:1;
}

.profile-info h2{
  color:#00ffd5;
  font-size:24px;
  margin-bottom:6px;
}

.profile-info p{
  font-size:14px;
  color:#aaa;
  margin-bottom:8px;
}

.profile-actions button{
  background:linear-gradient(135deg,#00ffd5,#6a5cff);
  border:none;
  padding:10px 20px;
  border-radius:999px;
  cursor:pointer;
  font-weight:600;
  transition:.3s;
  margin-right:10px;
  color:black;
}

.profile-actions button:hover{
  transform:scale(1.05);
  box-shadow:0 0 15px #00ffd5,0 0 25px #6a5cff;
}

/* WALLET & STATS CARDS */
.wallet-card, .stats-card{
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  display:flex;
  justify-content:space-between;
  flex-wrap:wrap;
  gap:20px;
  border:1px solid rgba(255,255,255,.1);
}

.wallet-card h3, .stats-card h3{
  color:#00ffd5;
  font-size:18px;
  margin-bottom:6px;
}

.wallet-card p, .stats-card p{
  font-size:16px;
}

/* NOTIFICATIONS */
.notification-center{
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(15px);
  padding:20px;
  border-radius:20px;
  border:1px solid rgba(255,255,255,.1);
  max-height:300px;
  overflow-y:auto;
}

.notification{
  padding:10px;
  border-radius:12px;
  margin-bottom:8px;
  cursor:pointer;
  transition:.2s;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.notification:hover{
  background:rgba(255,255,255,.1);
}

.notification.pending{border-left:4px solid #ffcc00;}
.notification.released{border-left:4px solid #00ff94;}
.notification.submitted{border-left:4px solid #6a5cff;}

/* RESPONSIVE */
@media(max-width:600px){
  .profile-card{
    flex-direction:column;
    align-items:center;
    text-align:center;
  }
  .profile-actions button{
    margin-bottom:10px;
  }
}
</style>
</head>
<body>

<header>
  <div class="logo" onclick="location.href='index.html'">Campus Wave</div>
  <button class="header-btn" onclick="location.href='discover.html'">Discover Music</button>
</header>

<div class="container">

  <!-- PROFILE CARD -->
  <div class="profile-card">
    <img id="profileImg" src="https://via.placeholder.com/120" alt="Profile">
    <div class="profile-info">
      <h2 id="studentName">Student Name</h2>
      <p id="studentUniversity">University Name</p>
      <div class="profile-actions">
        <button onclick="editProfile()">Edit Profile</button>
        <button onclick="openSettings()">Settings</button>
      </div>
    </div>
  </div>

  <!-- WALLET -->
  <div class="wallet-card">
    <div>
      <h3>ZAC Balance</h3>
      <p id="zacBalance">0 ZAC</p>
    </div>
    <div>
      <h3>USD Balance</h3>
      <p id="usdBalance">$0.00</p>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-card">
    <div>
      <h3>Tracks Uploaded</h3>
      <p id="tracksUploaded">0</p>
    </div>
    <div>
      <h3>Tips Received</h3>
      <p id="tipsReceived">0 ZAC</p>
    </div>
  </div>

  <!-- NOTIFICATION CENTER -->
  <div class="notification-center">
    <h3>Recent Activity</h3>
    <div id="notificationsList"></div>
  </div>

</div>

<script>
// Initialize user
let users = JSON.parse(localStorage.getItem("users")) || {};
let currentUserId = localStorage.getItem("currentUserId");
if(!currentUserId || !users[currentUserId]) location.href="login.html";
let user = users[currentUserId];

// Populate profile info
document.getElementById("profileImg").src = user.profileImage || "https://via.placeholder.com/120";
document.getElementById("studentName").innerText = user.name || "Student Name";
document.getElementById("studentUniversity").innerText = user.university || "University Name";

// Wallet
user.zacBalance = user.zacBalance || 0;
user.usdBalance = user.usdBalance || 0;
document.getElementById("zacBalance").innerText = user.zacBalance + " ZAC";
document.getElementById("usdBalance").innerText = "$" + user.usdBalance.toFixed(2);

// Stats
document.getElementById("tracksUploaded").innerText = user.uploads ? user.uploads.length : 0;
document.getElementById("tipsReceived").innerText = user.tipsReceived || 0;

// Notifications
let notifications = JSON.parse(localStorage.getItem("notifications")) || [];
const notificationsList = document.getElementById("notificationsList");
function renderNotifications(){
  notificationsList.innerHTML = "";
  notifications.forEach(n=>{
    const div = document.createElement("div");
    div.className = "notification " + (n.type || "pending");
    div.innerText = n.text;
    notificationsList.appendChild(div);
  });
}
renderNotifications();

// Dummy actions
function editProfile(){ alert("Edit profile clicked"); }
function openSettings(){ alert("Settings clicked"); }
</script>

</body>
</html>
