<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave • Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins:wght@300;400,500,600&display=swap" rel="stylesheet">
<style>
:root{
  --cw-blue:#00E5FF;
  --cw-violet:#7B4DFF;
  --bg:radial-gradient(circle at 30% 10%, #050018, #00000c);
  --glass:rgba(255,255,255,.08);
  --text-light:rgba(255,255,255,.7);
  --green:#00BFFF;
  --card-radius:20px;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}
body{background:var(--bg);color:white;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0;}
header{
  width:100%;display:flex;justify-content:space-between;align-items:center;padding:16px 24px;
  background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,.1);box-shadow:0 0 12px rgba(0,229,255,.2);
}
.brand{display:flex;align-items:center;gap:12px;font-family:Orbitron;font-size:1.5rem;cursor:pointer;}
.brand img{width:50px;height:50px;}
.logout-btn{background:linear-gradient(135deg,var(--cw-blue),var(--cw-violet));border:none;border-radius:50%;width:50px;height:50px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:20px;color:#050015;transition:.3s;}
.logout-btn:hover{transform:scale(1.05);}

.container{width:90%;max-width:700px;margin-top:24px;}
.glass{background:var(--glass);backdrop-filter:blur(20px);border-radius:var(--card-radius);padding:24px;margin-bottom:20px;box-shadow:0 0 30px rgba(0,229,255,0.2);}
.section-title{font-weight:600;margin-bottom:14px;font-size:18px;}
input{width:100%;padding:12px;margin-top:10px;border-radius:12px;border:none;background:rgba(255,255,255,0.05);color:white;font-size:14px;}
input::placeholder{color:var(--text-light);}
.profile-image{width:120px;height:120px;border-radius:50%;border:3px solid rgba(255,255,255,.3);object-fit:cover;cursor:pointer;transition:.3s;}
.profile-image:hover{transform:scale(1.05);}
.verified-badge{display:flex;align-items:center;gap:8px;font-family:Orbitron;font-size:14px;background:linear-gradient(90deg,var(--green),var(--cw-blue));padding:6px 12px;border-radius:12px;color:#050015;margin-top:8px;}
.save-btn{width:100%;padding:14px;border:none;border-radius:16px;background:linear-gradient(45deg,var(--cw-blue),var(--cw-violet));font-weight:600;color:#050015;margin-top:16px;cursor:pointer;}
.save-btn:hover{transform:translateY(-2px);box-shadow:0 0 36px rgba(123,77,255,.45);}
</style>
</head>
<body>

<header>
<div class="brand" onclick="window.location.href='dashboard.html'">
<img src="https://payhip.com/cdn-cgi/image/format=auto/https://pe56d.s3.amazonaws.com/o_1jfnua21qtu1vi2pfom33p641h.png" alt="Campus Wave Logo">
Campus Wave
</div>
<button class="logout-btn" title="Logout" onclick="logout()">⏻</button>
</header>

<div class="container">

<!-- Profile Picture -->
<div class="glass" style="text-align:center;">
<img src="https://via.placeholder.com/120" alt="Profile Image" class="profile-image" id="profileImg">
<div id="verifiedBadge" class="verified-badge" style="display:none;">✔ Verified</div>
</div>

<!-- Profile Details -->
<div class="glass">
<div class="section-title">Profile Details</div>
<input type="text" id="name" placeholder="Full Name">
<input type="text" id="university" placeholder="University">
<input type="text" id="country" placeholder="Country">
<input type="text" id="city" placeholder="City">
<input type="text" id="level" placeholder="Level (e.g., Student Artist)">
<button class="save-btn" onclick="saveProfile()">Save Profile</button>
</div>

</div>

<script>
// ======== USERS & SESSION =========
let users = JSON.parse(localStorage.getItem("users"))||{};
let currentUserId = localStorage.getItem("currentUserId");
if(!currentUserId || !users[currentUserId]) window.location.href='login.html';
let currentUser = users[currentUserId];

// DOM
const profileImg=document.getElementById("profileImg");
const nameInput=document.getElementById("name");
const universityInput=document.getElementById("university");
const countryInput=document.getElementById("country");
const cityInput=document.getElementById("city");
const levelInput=document.getElementById("level");
const verifiedBadge=document.getElementById("verifiedBadge");

// ======== Load Profile =========
function loadProfile(){
profileImg.src = currentUser.profileImage || "https://via.placeholder.com/120";
nameInput.value = currentUser.name||"";
universityInput.value=currentUser.university||"";
countryInput.value=currentUser.country||"";
cityInput.value=currentUser.city||"";
levelInput.value=currentUser.level||"";
checkVerified();
}
loadProfile();

// ======== Profile Image Upload =========
profileImg.addEventListener('click',()=>imgUpload.click());
const imgUpload=document.createElement("input");
imgUpload.type="file"; imgUpload.accept="image/*"; imgUpload.style.display="none";
document.body.appendChild(imgUpload);
imgUpload.addEventListener('change',e=>{
const file=e.target.files[0];
if(file){
const reader=new FileReader();
reader.onload=function(ev){
profileImg.src=ev.target.result;
currentUser.profileImage=ev.target.result;
saveUser();
checkVerified();
}
reader.readAsDataURL(file);
}
});

// ======== Save Profile =========
function saveProfile(){
currentUser.name=nameInput.value.trim();
currentUser.university=universityInput.value.trim();
currentUser.country=countryInput.value.trim();
currentUser.city=cityInput.value.trim();
currentUser.level=levelInput.value.trim();
saveUser();
checkVerified();
alert("Profile saved successfully!");
}

// ======== Check Verified =========
function checkVerified(){
if(nameInput.value && universityInput.value && countryInput.value && cityInput.value && levelInput.value && profileImg.src!=="https://via.placeholder.com/120"){
verifiedBadge.style.display="inline-flex";
currentUser.verified=true;
}else{
verifiedBadge.style.display="none";
currentUser.verified=false;
}
saveUser();
}

// ======== Save to LocalStorage =========
function saveUser(){users[currentUserId]=currentUser; localStorage.setItem("users",JSON.stringify(users));}

// ======== Logout =========
function logout(){localStorage.removeItem("currentUserId"); window.location.href='index.html';}
</script>

</body>
</html>
