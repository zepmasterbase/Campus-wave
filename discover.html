<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave Discover</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--neon-blue:#00f0ff;
--neon-purple:#8a2bff;
--neon-green:#1db954;
--bg:#070713;
}

body{
margin:0;
background:var(--bg);
color:white;
font-family:Poppins;
padding-bottom:120px;
overflow-x:hidden;
}

/* Header */

header{
padding:20px;
font-size:22px;
font-weight:600;
background:linear-gradient(90deg,var(--neon-blue),var(--neon-purple));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* Filters */

.filters{
display:flex;
gap:10px;
padding:10px 16px;
flex-wrap:wrap;
}

.filter{
background:#1b1b2e;
padding:8px 16px;
border-radius:20px;
font-size:13px;
}

.filter.active{
background:var(--neon-green);
color:black;
}

/* Sections */

.section{
padding:16px;
}

.section h2{
margin-bottom:10px;
font-size:20px;
}

/* Grid */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

/* Cards */

.card{
background:#111;
border-radius:14px;
overflow:hidden;
position:relative;
transition:.3s;
box-shadow:0 0 10px rgba(0,0,0,.4);
}

.card:hover{
transform:translateY(-4px) scale(1.03);
box-shadow:0 0 18px var(--neon-blue);
}

.cover{
width:100%;
height:120px;
object-fit:cover;
}

.play-overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:var(--neon-green);
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
opacity:0;
transition:.2s;
}

.card:hover .play-overlay{
opacity:1;
}

.title{
padding:10px;
font-size:14px;
}

/* Charts */

.chart-card{
display:flex;
align-items:center;
gap:10px;
background:#111;
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

.chart-card img{
width:45px;
height:45px;
border-radius:6px;
}

/* Artist icons */

.artist-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
}

.artist{
text-align:center;
font-size:12px;
}

.artist img{
width:70px;
height:70px;
border-radius:50%;
border:2px solid var(--neon-blue);
box-shadow:0 0 10px var(--neon-purple);
}

/* Player */

.player{
position:fixed;
bottom:60px;
left:0;
right:0;
background:#0f0f1d;
padding:10px;
display:flex;
align-items:center;
gap:10px;
border-top:1px solid #222;
}

.player img{
width:45px;
height:45px;
border-radius:6px;
}

.track-info{
flex:1;
font-size:13px;
}

/* waveform */

.wave{
display:flex;
gap:3px;
height:18px;
align-items:flex-end;
}

.bar{
width:3px;
background:var(--neon-green);
animation:wave 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:.1s}
.bar:nth-child(3){animation-delay:.2s}
.bar:nth-child(4){animation-delay:.3s}

@keyframes wave{
0%{height:4px}
50%{height:18px}
100%{height:4px}
}

.play-btn{
background:var(--neon-green);
border:none;
width:40px;
height:40px;
border-radius:50%;
font-size:18px;
}

/* Bottom Nav */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:#0b0b16;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #222;
}

.nav-item{
text-align:center;
font-size:12px;
color:#bbb;
}

.nav-item.active{
color:var(--neon-green);
}

audio{display:none}

</style>
</head>

<body>

<header>Campus Wave</header>

<div class="filters">
<div class="filter active">All</div>
<div class="filter">Music</div>
<div class="filter">Campus Radio</div>
<div class="filter">Podcasts</div>
</div>

<!-- Campus Radio -->

<div class="section">
<h2>Campus Radio</h2>
<button onclick="playRadio()">▶ Listen Live</button>
</div>

<!-- Charts -->

<div class="section">
<h2>Top Campus Charts</h2>
<div id="charts"></div>
</div>

<!-- Discover -->

<div class="section">
<h2>Discover Music</h2>
<div class="grid" id="musicGrid"></div>
</div>

<!-- Artists -->

<div class="section">
<h2>Campus Artists</h2>

<div class="artist-grid">

<div class="artist">
<img src="https://picsum.photos/100?11">
<div>DJ Nova</div>
</div>

<div class="artist">
<img src="https://picsum.photos/100?12">
<div>Kofi Beats</div>
</div>

<div class="artist">
<img src="https://picsum.photos/100?13">
<div>Campus Vibez</div>
</div>

<div class="artist">
<img src="https://picsum.photos/100?14">
<div>WaveKid</div>
</div>

</div>

</div>

<!-- Player -->

<div class="player">

<img id="coverArt">

<div class="track-info">

<div id="trackTitle">Nothing Playing</div>

<div class="wave">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

</div>

<button class="play-btn" onclick="togglePlay()">▶</button>

</div>

<audio id="audio"></audio>

<!-- Bottom Nav -->

<div class="bottom-nav">

<div class="nav-item active">🏠 Home</div>
<div class="nav-item">🔍 Discover</div>
<div class="nav-item" onclick="location.href='upload.html'">➕ Upload</div>
<div class="nav-item" onclick="location.href='campus-chart.html'">📈 Charts</div>
<div class="nav-item">👤 Profile</div>

</div>

<script>

let tracks=[

{
title:"Campus Vibes",
artist:"Student Artist",
cover:"https://picsum.photos/300?1",
url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
},

{
title:"Library Nights",
artist:"Uni Beats",
cover:"https://picsum.photos/300?2",
url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
}

]

/* Load uploads */

let uploads=JSON.parse(localStorage.getItem("campusUploads"))||[]
tracks=tracks.concat(uploads)

const grid=document.getElementById("musicGrid")
const charts=document.getElementById("charts")

tracks.forEach((track,i)=>{

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<img class="cover" src="${track.cover}">
<div class="play-overlay">▶</div>
<div class="title">${track.title}</div>
`

card.onclick=()=>playTrack(i)

grid.appendChild(card)

/* charts */

let chart=document.createElement("div")
chart.className="chart-card"

chart.innerHTML=`
<img src="${track.cover}">
<div>${track.title}</div>
<button onclick="tipArtist('${track.title}')">💸 Tip</button>
`

charts.appendChild(chart)

})

const audio=document.getElementById("audio")

function playTrack(i){

let track=tracks[i]

audio.src=track.url
audio.play()

document.getElementById("coverArt").src=track.cover
document.getElementById("trackTitle").innerText=track.title

}

function togglePlay(){

if(audio.paused){audio.play()}
else{audio.pause()}

}

/* Campus radio */

function playRadio(){

let r=Math.floor(Math.random()*tracks.length)
playTrack(r)

}

/* Zep Cash tips */

function tipArtist(track){

let tips=JSON.parse(localStorage.getItem("zepTips"))||{}

tips[track]=(tips[track]||0)+5

localStorage.setItem("zepTips",JSON.stringify(tips))

alert("You tipped 5 Zep Cash 💸")

}

</script>

</body>
</html>
