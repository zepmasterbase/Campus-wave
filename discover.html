<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave Discover</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
background:#0b0b0b;
color:white;
font-family:Poppins;
}

/* Header */

header{
padding:18px;
font-size:22px;
font-weight:600;
}

/* Filter pills */

.filters{
display:flex;
gap:10px;
overflow:auto;
padding:10px 16px;
}

.filter{
background:#2a2a2a;
padding:8px 16px;
border-radius:20px;
font-size:14px;
cursor:pointer;
white-space:nowrap;
}

.filter.active{
background:#1db954;
color:black;
}

/* Sections */

.section{
padding:10px 16px;
}

.section h2{
font-size:20px;
margin-bottom:10px;
}

/* Music grid */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

/* 3D glowing cards */

.card{
background:#1c1c1c;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.25s;
position:relative;
transform-style:preserve-3d;
}

.card:hover{
transform:scale(1.04) rotateX(3deg);
box-shadow:0 0 15px rgba(0,255,200,0.5);
}

/* Cover */

.cover{
width:100%;
height:120px;
object-fit:cover;
}

/* Play button overlay */

.play-overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#1db954;
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
opacity:0;
transition:0.2s;
}

.card:hover .play-overlay{
opacity:1;
}

/* Title */

.title{
padding:10px;
font-size:14px;
font-weight:500;
}

/* Jump back in */

.jump-scroll{
display:flex;
overflow:auto;
gap:14px;
}

.jump-card{
min-width:140px;
}

.jump-card img{
width:100%;
border-radius:10px;
}

/* Artist cards */

.artist-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
}

.artist{
text-align:center;
}

.artist img{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:2px solid #1db954;
}

/* Campus chart */

.chart-card{
display:flex;
align-items:center;
gap:10px;
background:#1c1c1c;
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

.chart-card img{
width:50px;
height:50px;
border-radius:6px;
object-fit:cover;
}

/* Player */

.player{
position:fixed;
bottom:0;
left:0;
right:0;
background:#111;
padding:10px;
display:flex;
align-items:center;
gap:10px;
border-top:1px solid #333;
}

.player img{
width:45px;
height:45px;
border-radius:6px;
}

.track-info{
flex:1;
font-size:13px;
}

/* Waveform animation */

.wave{
display:flex;
gap:3px;
align-items:flex-end;
height:20px;
}

.bar{
width:3px;
background:#1db954;
animation:wave 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:.1s}
.bar:nth-child(3){animation-delay:.2s}
.bar:nth-child(4){animation-delay:.3s}
.bar:nth-child(5){animation-delay:.4s}

@keyframes wave{
0%{height:5px}
50%{height:18px}
100%{height:5px}
}

.play-btn{
background:#1db954;
border:none;
border-radius:50%;
width:40px;
height:40px;
font-size:18px;
cursor:pointer;
}

audio{display:none}

</style>
</head>

<body>

<header>Discover</header>

<div class="filters">
<div class="filter active">All</div>
<div class="filter">Music</div>
<div class="filter">Campus Radio</div>
<div class="filter">Podcasts</div>
</div>

<!-- Jump Back In -->

<div class="section">
<h2>Jump Back In</h2>
<div class="jump-scroll" id="history"></div>
</div>

<!-- Top Campus Charts -->

<div class="section">
<h2>Top Campus Charts</h2>
<div id="charts"></div>
</div>

<!-- Discover Music -->

<div class="section">
<h2>Discover Music</h2>
<div class="grid" id="musicGrid"></div>
</div>

<!-- Artist Profiles -->

<div class="section">
<h2>Campus Artists</h2>
<div class="artist-grid">

<div class="artist">
<img src="https://picsum.photos/100?11">
<div>DJ Kofi</div>
</div>

<div class="artist">
<img src="https://picsum.photos/100?12">
<div>Nova Beats</div>
</div>

<div class="artist">
<img src="https://picsum.photos/100?13">
<div>Campus Vibez</div>
</div>

</div>
</div>

<!-- Player -->

<div class="player">

<img id="coverArt">

<div class="track-info">
<div id="trackTitle">Nothing Playing</div>

<div class="wave">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

</div>

<button class="play-btn" onclick="togglePlay()">▶</button>

</div>

<audio id="audio"></audio>

<script>

const tracks=[

{
title:"Campus Vibes",
artist:"Student Artist",
cover:"https://picsum.photos/300?1",
url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
},

{
title:"Library Nights",
artist:"Uni Beats",
cover:"https://picsum.photos/300?2",
url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
},

{
title:"Study Flow",
artist:"Dorm Studio",
cover:"https://picsum.photos/300?3",
url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"
}

]

const grid=document.getElementById("musicGrid")
const charts=document.getElementById("charts")
const history=document.getElementById("history")

tracks.forEach((track,i)=>{

const card=document.createElement("div")
card.className="card"

card.innerHTML=`
<img class="cover" src="${track.cover}">
<div class="play-overlay">▶</div>
<div class="title">${track.title}</div>
`

card.onclick=()=>playTrack(i)

grid.appendChild(card)

/* charts */

const chart=document.createElement("div")
chart.className="chart-card"

chart.innerHTML=`
<img src="${track.cover}">
<div>${track.title}</div>
`

charts.appendChild(chart)

})

const audio=document.getElementById("audio")

function playTrack(i){

const track=tracks[i]

audio.src=track.url
audio.play()

document.getElementById("coverArt").src=track.cover
document.getElementById("trackTitle").innerText=track.title

/* save history */

let historyTracks=JSON.parse(localStorage.getItem("history"))||[]
historyTracks.unshift(track)

localStorage.setItem("history",JSON.stringify(historyTracks.slice(0,5)))

renderHistory()

}

function togglePlay(){

if(audio.paused){
audio.play()
}else{
audio.pause()
}

}

function renderHistory(){

history.innerHTML=""

let historyTracks=JSON.parse(localStorage.getItem("history"))||[]

historyTracks.forEach(track=>{

const card=document.createElement("div")
card.className="jump-card"

card.innerHTML=`
<img src="${track.cover}">
`

history.appendChild(card)

})

}

renderHistory()

</script>

</body>
</html>
