<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave • Discover</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins:wght@300;400,500,600&display=swap" rel="stylesheet">
<style>
:root{
  --cw-blue:#00E5FF;
  --cw-violet:#7B4DFF;
  --bg:radial-gradient(circle at 30% 10%, #050018, #00000c);
  --glass:rgba(255,255,255,.08);
  --text-light:rgba(255,255,255,.7);
  --green:#00BFFF;
  --card-radius:20px;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}
body{background:var(--bg);color:white;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0;}
header{
  width:100%;display:flex;justify-content:space-between;align-items:center;padding:16px 24px;
  background:rgba(0,0,0,0.3);border-bottom:1px solid rgba(255,255,255,.1);box-shadow:0 0 12px rgba(0,229,255,.2);
}
.brand{display:flex;align-items:center;gap:12px;font-family:Orbitron;font-size:1.5rem;cursor:pointer;}
.brand img{width:50px;height:50px;}
.nav-btns button{margin-left:12px;padding:8px 12px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--cw-blue),var(--cw-violet));color:#050015;font-weight:600;cursor:pointer;transition:.3s;}
.nav-btns button:hover{transform:scale(1.05);}

.container{width:95%;max-width:1100px;margin-top:24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:20px;}

.music-card{background:var(--glass);backdrop-filter:blur(16px);border-radius:var(--card-radius);padding:16px;display:flex;flex-direction:column;align-items:center;box-shadow:0 0 20px rgba(0,229,255,.2);transition:.3s;position:relative;}
.music-card:hover{transform:translateY(-3px);box-shadow:0 0 35px rgba(123,77,255,.35);}
.album-art{width:100%;height:180px;border-radius:16px;object-fit:cover;cursor:pointer;}
.artist-details{margin-top:12px;text-align:center;}
.artist-details h4{margin-bottom:4px;}
.artist-details span{font-size:0.85rem;color:var(--text-light);}
.controls{margin-top:12px;display:flex;gap:16px;align-items:center;}
.play-btn, .love-btn{padding:8px 12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:.3s;}
.play-btn{background:linear-gradient(135deg,var(--cw-blue),var(--cw-violet));color:#050015;}
.play-btn:hover{transform:scale(1.05);}
.love-btn{background:linear-gradient(135deg,#FFD700,#FF69B4);color:#050015;display:flex;align-items:center;gap:6px;}
.love-btn:hover{transform:scale(1.05);}
</style>
</head>
<body>

<header>
<div class="brand" onclick="window.location.href='dashboard.html'">
<img src="https://payhip.com/cdn-cgi/image/format=auto/https://pe56d.s3.amazonaws.com/o_1jfnua21qtu1vi2pfom33p641h.png" alt="Campus Wave Logo">
Campus Wave
</div>
<div class="nav-btns">
<button onclick="window.location.href='campus-chart.html'">Campus Chart</button>
<button onclick="window.location.href='radio.html'">Campus Radio</button>
</div>
</header>

<div class="container" id="musicContainer">
<!-- Music cards dynamically generated -->
</div>

<!-- Mini Audio Player -->
<audio id="audioPlayer"></audio>

<script>
// ======== USERS & ARTISTS =========
let users = JSON.parse(localStorage.getItem("users"))||{};
let currentUserId = localStorage.getItem("currentUserId");
if(!currentUserId || !users[currentUserId]) window.location.href='login.html';
let currentUser = users[currentUserId];

// ======== SAMPLE ARTISTS DATA =========
let artists = Object.values(users).filter(u=>u.verified); // only verified users
// Sample tracks for each artist
let tracks = artists.map(artist=>({
  artistId: artist.id,
  name: `Track by ${artist.name}`,
  albumArt: "https://via.placeholder.com/280x180",
  src: "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3",
  university: artist.university || "Unknown Uni",
  country: artist.country || "Unknown",
  tips: 0,
}));

// ======== RENDER MUSIC CARDS =========
const musicContainer=document.getElementById("musicContainer");
const audioPlayer=document.getElementById("audioPlayer");
let currentPlaying=null;

tracks.forEach(track=>{
  const card=document.createElement("div");
  card.className="music-card";

  const img=document.createElement("img");
  img.className="album-art"; img.src=track.albumArt; card.appendChild(img);

  const details=document.createElement("div"); details.className="artist-details";
  details.innerHTML=`<h4>${track.name}</h4><span>${track.university} | ${track.country}</span>`;
  card.appendChild(details);

  const controls=document.createElement("div"); controls.className="controls";
  const playBtn=document.createElement("button"); playBtn.className="play-btn"; playBtn.innerText="Play";
  playBtn.addEventListener("click",()=>{
    if(currentPlaying===track.src){audioPlayer.paused?audioPlayer.play():audioPlayer.pause(); playBtn.innerText=audioPlayer.paused?"Play":"Pause";}
    else{audioPlayer.src=track.src;audioPlayer.play(); currentPlaying=track.src; updatePlayButtons();}
  });
  const loveBtn=document.createElement("button"); loveBtn.className="love-btn"; loveBtn.innerHTML="💰 Tip";
  loveBtn.addEventListener("click",()=>{
    track.tips += 1;
    const artist = users[track.artistId];
    artist.walletBalance = (artist.walletBalance||0)+1;
    users[track.artistId]=artist;
    localStorage.setItem("users",JSON.stringify(users));
    alert(`You tipped ${artist.name} 1 ZAC! Total Tips: ${track.tips}`);
  });

  controls.appendChild(playBtn); controls.appendChild(loveBtn);
  card.appendChild(controls);

  musicContainer.appendChild(card);
});

// ======== UPDATE PLAY BUTTONS TEXT =========
function updatePlayButtons(){
  document.querySelectorAll(".play-btn").forEach(btn=>{
    btn.innerText="Play";
  });
  let playingBtn = Array.from(document.querySelectorAll(".music-card")).find(c=>c.querySelector("img").src===audioPlayer.src)?.querySelector(".play-btn");
  if(playingBtn) playingBtn.innerText=audioPlayer.paused?"Play":"Pause";
}

// ======== AUDIO EVENTS =========
audioPlayer.addEventListener("ended",()=>{currentPlaying=null;updatePlayButtons();});
audioPlayer.addEventListener("pause",updatePlayButtons);
audioPlayer.addEventListener("play",updatePlayButtons);

</script>

</body>
</html>
