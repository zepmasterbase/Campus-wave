<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave — Discover</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins:wght@300;400,500,600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#00f0ff;
  --violet:#9c4dff;
  --green:#00ff94;
  --yellow:#ffcc00;
  --bg:#050018;
  --glass:rgba(255,255,255,.08);
  --text-light:rgba(255,255,255,.85);
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}
body{background:var(--bg);color:#fff;min-height:100vh;display:flex;flex-direction:column;}
header{
  display:flex;justify-content:space-between;align-items:center;padding:16px 20px;
  backdrop-filter:blur(12px);background:rgba(0,0,0,.35);
  border-bottom:1px solid rgba(255,255,255,.08);
}
header h1{font-family:Orbitron;font-size:1.5rem;}
header .nav-buttons{display:flex;gap:12px;}
header .nav-buttons button{
  padding:8px 14px;border:none;border-radius:999px;font-family:Orbitron;
  background:linear-gradient(90deg,var(--blue),var(--violet));
  color:#050015;cursor:pointer;transition:.3s;
}
header .nav-buttons button:hover{transform:scale(1.05);}
.container{
  max-width:1200px;margin:20px auto;padding:16px;display:flex;flex-direction:column;gap:24px;
}
.card{
  background:var(--glass);padding:16px;border-radius:18px;
  border:1px solid rgba(255,255,255,.12);transition:.3s;cursor:pointer;
}
.card:hover{transform:translateY(-5px);box-shadow:0 0 20px var(--blue),0 0 30px var(--violet);}
.card h3{font-family:Orbitron;margin-bottom:6px;}
.card p{color:var(--text-light);}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:16px;}
button.tip-btn{
  padding:8px 14px;margin-top:8px;border:none;border-radius:999px;
  background:linear-gradient(90deg,var(--green),var(--blue));
  color:#050015;font-family:Orbitron;cursor:pointer;transition:.3s;
}
button.tip-btn:hover{transform:scale(1.05);box-shadow:0 0 20px var(--green);}
.floating-player{
  position:fixed;bottom:0;left:0;width:100%;padding:12px 20px;
  background:rgba(0,0,0,.9);backdrop-filter:blur(12px);
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  border-top:1px solid rgba(255,255,255,.12);z-index:999;
}
.floating-player audio{flex:1;width:100%;margin:0 12px;}
.floating-player button{padding:8px 12px;border:none;border-radius:999px;background:linear-gradient(90deg,var(--blue),var(--violet));color:#050015;font-family:Orbitron;cursor:pointer;transition:.3s;}
.floating-player button:hover{transform:scale(1.05);box-shadow:0 0 20px var(--blue);}
@media(max-width:600px){
  .grid{grid-template-columns:1fr;}
  header{flex-direction:column;align-items:flex-start;gap:12px;}
}
</style>
</head>
<body>

<header>
  <h1>Campus Wave Discover</h1>
  <div class="nav-buttons">
    <button onclick="location.href='campus-chart.html'">Campus Chart</button>
    <button onclick="location.href='login.html'">Login to Upload</button>
  </div>
</header>

<div class="container">

  <!-- Top Tracks Grid -->
  <h2>Trending Student Tracks</h2>
  <div class="grid" id="tracksGrid">
    <!-- JS will populate cards -->
  </div>

  <!-- Campus Radio Card -->
  <div class="card" id="campusRadioCard">
    <h3>Campus Radio 🎧</h3>
    <p>Listen to live campus music and student tracks from all universities.</p>
    <button onclick="playRadio()">Listen Live</button>
  </div>

  <!-- University Map Card -->
  <div class="card" id="universityMapCard">
    <h3>University Map 🌍</h3>
    <p>Discover top tracks by university with interactive 3D map visuals.</p>
    <button onclick="location.href='university-map.html'">Discover Map</button>
  </div>

</div>

<!-- Floating Player -->
<div class="floating-player">
  <span id="playerTrack">No track playing</span>
  <audio id="playerAudio" controls></audio>
  <button onclick="location.href='player.html'">Open Player</button>
</div>

<script>
// Demo localStorage tracks for now
let demoTracks = [
  {title:"Campus Vibe",artist:"Student A",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"},
  {title:"Lecture Beats",artist:"Student B",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"},
  {title:"Study Flow",artist:"Student C",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3"},
  {title:"Library Nights",artist:"Student D",url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3"},
];

// Render Tracks
const tracksGrid = document.getElementById("tracksGrid");
demoTracks.forEach((track,i)=>{
  const div = document.createElement("div");
  div.className="card";
  div.innerHTML=`<h3>${track.title}</h3><p>by ${track.artist}</p>
  <button class="tip-btn" onclick="playTrack(${i})">Play Preview</button>
  <button class="tip-btn" onclick="tipArtist(${i})">Tip Artist</button>`;
  tracksGrid.appendChild(div);
});

// Floating Player Controls
const playerAudio = document.getElementById("playerAudio");
const playerTrack = document.getElementById("playerTrack");
function playTrack(index){
  const track = demoTracks[index];
  playerAudio.src = track.url;
  playerAudio.play();
  playerTrack.innerText = `${track.title} — ${track.artist}`;
}

// Tip Artist Simulation (localStorage)
function tipArtist(index){
  const track = demoTracks[index];
  let tips = JSON.parse(localStorage.getItem("trackTips")) || {};
  tips[track.title] = (tips[track.title]||0)+1; // +1 simulated Zep Cash tip
  localStorage.setItem("trackTips",JSON.stringify(tips));
  alert(`You tipped ${track.artist}! Total Tips: ${tips[track.title]} Zep Cash`);
}

// Campus Radio
function playRadio(){
  playerAudio.src = demoTracks[Math.floor(Math.random()*demoTracks.length)].url;
  playerAudio.play();
  playerTrack.innerText = "Campus Radio Live 🎧";
}
</script>

</body>
</html>
