<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave Discover</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--neon-blue:#00f0ff;
--neon-purple:#8a2bff;
--neon-green:#1db954;
--bg:#070713;
}

body{
margin:0;
background:var(--bg);
color:white;
font-family:Poppins;
padding-bottom:120px;
overflow-x:hidden;
}

/* HEADER */

header{
padding:18px;
display:flex;
flex-direction:column;
gap:12px;
}

/* glowing title */

.logo{
font-size:22px;
font-weight:600;
background:linear-gradient(90deg,var(--neon-blue),var(--neon-purple));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* glowing search */

.search{
background:#111;
border-radius:25px;
padding:10px 16px;
color:#777;
font-size:14px;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{box-shadow:0 0 5px var(--neon-blue)}
50%{box-shadow:0 0 20px var(--neon-purple)}
100%{box-shadow:0 0 5px var(--neon-blue)}
}

/* sections */

.section{
padding:16px;
}

.section h2{
margin-bottom:10px;
font-size:20px;
}

/* GENRE CARDS */

.genre-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
}

.genre{
background:#111;
padding:16px;
border-radius:12px;
font-weight:500;
box-shadow:0 0 10px rgba(0,0,0,.4);
}

/* MUSIC GRID */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:14px;
}

.card{
background:#111;
border-radius:14px;
overflow:hidden;
position:relative;
transition:.3s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0 0 18px var(--neon-blue);
}

.cover{
width:100%;
height:120px;
object-fit:cover;
}

.play-overlay{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:var(--neon-green);
width:50px;
height:50px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
opacity:0;
}

.card:hover .play-overlay{
opacity:1;
}

.title{
padding:10px;
font-size:14px;
}

/* CHARTS */

.chart-card{
display:flex;
align-items:center;
gap:10px;
background:#111;
padding:10px;
border-radius:10px;
margin-bottom:8px;
}

.chart-card img{
width:45px;
height:45px;
border-radius:6px;
}

.tip-btn{
background:none;
border:none;
cursor:pointer;
}

/* ARTISTS */

.artist-grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:14px;
}

.artist{
text-align:center;
font-size:12px;
}

.artist img{
width:70px;
height:70px;
border-radius:50%;
border:2px solid var(--neon-blue);
box-shadow:0 0 10px var(--neon-purple);
}

/* PLAYER */

.player{
position:fixed;
bottom:60px;
left:0;
right:0;
background:#0f0f1d;
padding:10px;
display:flex;
align-items:center;
gap:10px;
border-top:1px solid #222;
}

.player img{
width:45px;
height:45px;
border-radius:6px;
}

.track-info{
flex:1;
font-size:13px;
}

/* waveform */

.wave{
display:flex;
gap:3px;
height:18px;
align-items:flex-end;
}

.bar{
width:3px;
background:var(--neon-green);
animation:wave 1s infinite ease-in-out;
}

@keyframes wave{
0%{height:4px}
50%{height:18px}
100%{height:4px}
}

/* FOOTER NAV */

.bottom-nav{
position:fixed;
bottom:0;
left:0;
right:0;
height:60px;
background:#0b0b16;
display:flex;
justify-content:space-around;
align-items:center;
border-top:1px solid #222;
}

.nav-item{
display:flex;
flex-direction:column;
align-items:center;
font-size:11px;
color:#aaa;
}

.nav-item svg{
width:22px;
height:22px;
margin-bottom:2px;
fill:#aaa;
}

.nav-item.active svg{
fill:var(--neon-green);
}

audio{display:none}

</style>
</head>

<body>

<header>

<div class="logo">Campus Wave</div>

<div class="search">🔎 Discover artists, tracks, podcasts...</div>

</header>

<!-- GENRES -->

<div class="section">

<h2>Browse Genres</h2>

<div class="genre-grid">

<div class="genre">Afrobeats</div>
<div class="genre">Hip Hop</div>
<div class="genre">Amapiano</div>
<div class="genre">R&B</div>
<div class="genre">Gospel</div>
<div class="genre">Dancehall</div>

</div>

</div>

<!-- CHARTS -->

<div class="section">

<h2>Top Campus Charts</h2>

<div id="charts"></div>

</div>

<!-- DISCOVER -->

<div class="section">

<h2>Discover Music</h2>

<div class="grid" id="musicGrid"></div>

</div>

<!-- PLAYER -->

<div class="player">

<img id="coverArt">

<div class="track-info">

<div id="trackTitle">Nothing Playing</div>

<div class="wave">
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
</div>

</div>

<button onclick="togglePlay()">▶</button>

</div>

<audio id="audio"></audio>

<!-- NAVIGATION -->

<div class="bottom-nav">

<div class="nav-item active">

<svg viewBox="0 0 24 24">
<path d="M3 10L12 3l9 7v11h-6v-6H9v6H3z"/>
</svg>

Home

</div>

<div class="nav-item">

<svg viewBox="0 0 24 24">
<path d="M10 2a8 8 0 105.29 14.29l5.7 5.7 1.42-1.42-5.7-5.7A8 8 0 0010 2z"/>
</svg>

Discover

</div>

<div class="nav-item" onclick="location.href='upload.html'">

<svg viewBox="0 0 24 24">
<path d="M12 5v14M5 12h14"/>
</svg>

Upload

</div>

<div class="nav-item" onclick="location.href='campus-chart.html'">

<svg viewBox="0 0 24 24">
<path d="M5 3v18M9 12h3v6H9zM14 6h3v12h-3z"/>
</svg>

Charts

</div>

<div class="nav-item" onclick="location.href='podcast.html'">

<svg viewBox="0 0 24 24">
<path d="M12 3a7 7 0 017 7c0 3-2 5-4 6v3h-6v-3c-2-1-4-3-4-6a7 7 0 017-7z"/>
</svg>

Podcast

</div>

</div>

<script>

let tracks=[

{
title:"Campus Vibes",
artist:"Student Artist",
cover:"https://picsum.photos/300?1",
url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
},

{
title:"Amapiano Nights",
artist:"DJ Nova",
cover:"https://picsum.photos/300?2",
url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3"
}

]

const grid=document.getElementById("musicGrid")
const charts=document.getElementById("charts")

tracks.forEach((track,i)=>{

let card=document.createElement("div")
card.className="card"

card.innerHTML=`
<img class="cover" src="${track.cover}">
<div class="play-overlay">▶</div>
<div class="title">${track.title}</div>
`

card.onclick=()=>playTrack(i)

grid.appendChild(card)

let chart=document.createElement("div")
chart.className="chart-card"

chart.innerHTML=`
<img src="${track.cover}">
<div>${track.title}</div>
<button class="tip-btn" onclick="tipArtist('${track.title}')">
💰
</button>
`

charts.appendChild(chart)

})

const audio=document.getElementById("audio")

function playTrack(i){

let track=tracks[i]

audio.src=track.url
audio.play()

document.getElementById("coverArt").src=track.cover
document.getElementById("trackTitle").innerText=track.title

}

function togglePlay(){

if(audio.paused){audio.play()}
else{audio.pause()}

}

function tipArtist(track){

let tips=JSON.parse(localStorage.getItem("zepTips"))||{}

tips[track]=(tips[track]||0)+5

localStorage.setItem("zepTips",JSON.stringify(tips))

alert("You tipped 5 Zep Cash 💰")

}

</script>

</body>
</html>
