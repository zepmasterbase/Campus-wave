<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Campus Wave | Discover</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:#0a0a0f;
color:white;
display:flex;
}

.sidebar{
width:230px;
height:100vh;
background:linear-gradient(180deg,#12121a,#0b0b12);
padding:30px;
position:fixed;
}

.logo{
font-size:22px;
font-weight:600;
margin-bottom:40px;
color:#00ffd5;
}

.menu a{
display:block;
color:#ccc;
text-decoration:none;
margin:18px 0;
font-size:15px;
transition:.3s;
}

.menu a:hover{
color:#00ffd5;
transform:translateX(5px);
}

.main{
margin-left:230px;
padding:40px;
width:100%;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

.search{
background:#151520;
border:none;
padding:12px 15px;
border-radius:10px;
color:white;
width:260px;
}

.section-title{
font-size:22px;
margin-bottom:20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
}

.card{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
border-radius:15px;
padding:20px;
transition:.4s;
cursor:pointer;
position:relative;
overflow:hidden;
}

.card:hover{
transform:translateY(-10px) scale(1.02);
box-shadow:0 20px 40px rgba(0,255,200,0.2);
}

.cover{
width:100%;
height:150px;
border-radius:10px;
background:linear-gradient(135deg,#00ffd5,#6a5cff);
margin-bottom:12px;
}

.song{
font-size:16px;
font-weight:500;
}

.artist{
font-size:13px;
color:#aaa;
margin-top:4px;
}

.play{
position:absolute;
right:15px;
bottom:60px;
background:#00ffd5;
border:none;
width:40px;
height:40px;
border-radius:50%;
color:black;
font-size:16px;
cursor:pointer;
}

.tip{
margin-top:10px;
background:#6a5cff;
border:none;
padding:7px 12px;
border-radius:8px;
color:white;
font-size:12px;
cursor:pointer;
}

.playlists{
margin-top:50px;
}

.playlist-card{
background:linear-gradient(135deg,#6a5cff,#00ffd5);
padding:30px;
border-radius:15px;
font-weight:500;
cursor:pointer;
transition:.4s;
}

.playlist-card:hover{
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="sidebar">

<div class="logo">Campus Wave</div>

<div class="menu">
<a href="#">Home</a>
<a href="#">Discover</a>
<a href="#">Campus Charts</a>
<a href="#">Artists</a>
<a href="#">Upload Music</a>
<a href="#">My Library</a>
</div>

</div>


<div class="main">

<div class="header">

<h2>Discover Music</h2>

<input class="search" placeholder="Search artists, songs, campus...">

</div>


<div class="section-title">🔥 Trending on Campus</div>

<div class="cards">

<div class="card">
<div class="cover"></div>
<div class="song">Midnight Vibes</div>
<div class="artist">Jay Kofi</div>
<button class="play">▶</button>
<button class="tip">Tip $1</button>
</div>

<div class="card">
<div class="cover"></div>
<div class="song">Dorm Party</div>
<div class="artist">Luna Dee</div>
<button class="play">▶</button>
<button class="tip">Tip $1</button>
</div>

<div class="card">
<div class="cover"></div>
<div class="song">Late Night Coding</div>
<div class="artist">Code Beats</div>
<button class="play">▶</button>
<button class="tip">Tip $1</button>
</div>

<div class="card">
<div class="cover"></div>
<div class="song">African Sunset</div>
<div class="artist">Nova Tribe</div>
<button class="play">▶</button>
<button class="tip">Tip $1</button>
</div>

</div>


<div class="playlists">

<div class="section-title">🎧 Discover Playlists</div>

<div class="cards">

<div class="playlist-card">
Campus Party Mix
</div>

<div class="playlist-card">
Study Mode
</div>

<div class="playlist-card">
Afrobeats Rising
</div>

<div class="playlist-card">
Indie Campus Stars
</div>

</div>

</div>

</div>

</body>
</html>
