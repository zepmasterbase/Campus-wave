<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload • Campus Wave</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#070716;color:white;}
.container{padding-bottom:140px;}
header{display:flex;justify-content:space-between;align-items:center;padding:18px;}
.logo{font-size:20px;font-weight:700;background:linear-gradient(90deg,#00E5FF,#7B4DFF);-webkit-background-clip:text;color:transparent;}
.back{font-size:22px;cursor:pointer;}
.glass{background:rgba(255,255,255,0.05);backdrop-filter:blur(20px);border-radius:22px;padding:22px;margin:20px;box-shadow:0 0 30px rgba(0,229,255,0.25);}
.section-title{font-weight:600;margin-bottom:14px;}
input, select, textarea{width:100%;padding:12px;margin-top:10px;border-radius:12px;border:none;background:#1a1a44;color:white;font-size:14px;}
textarea{resize:none;height:80px;}
.upload-box{border:2px dashed rgba(255,255,255,0.2);border-radius:16px;padding:25px;text-align:center;margin-top:12px;cursor:pointer;}
button{margin-top:16px;padding:14px;width:100%;border:none;border-radius:16px;font-weight:600;background:linear-gradient(45deg,#00E5FF,#7B4DFF);color:white;cursor:pointer;}
.preview{margin-top:14px;}
.preview img{width:100%;border-radius:12px;}
audio{width:100%;margin-top:10px;}
.waveform{width:100%;height:40px;background:#111;border-radius:6px;margin-top:10px;position:relative;overflow:hidden;}
.wave-bar{position:absolute;bottom:0;width:3px;background:#00E5FF;animation:wave 1s infinite;display:inline-block;}
@keyframes wave{0%{height:10px;}50%{height:35px;}100%{height:10px;}}
footer{position:fixed;bottom:0;width:100%;height:60px;background:#0b0b22;display:flex;justify-content:space-around;align-items:center;}
footer a{color:white;text-decoration:none;font-size:13px;text-align:center;}
</style>
</head>
<body>
<div class="container">
<header>
<div class="logo">Campus Wave</div>
<div class="back" onclick="window.location.href='dashboard.html'">←</div>
</header>

<!-- Upload Type -->
<div class="glass">
<div class="section-title">Upload Type</div>
<select id="type">
<option value="music">Music Track</option>
<option value="podcast">Podcast Episode</option>
</select>
</div>

<!-- Track Details -->
<div class="glass">
<div class="section-title">Track Details</div>
<input id="title" placeholder="Track / Episode Title">
<input id="artist" placeholder="Artist / Host Name">
<select id="genre">
<option>Afrobeats</option><option>Hip Hop</option><option>Amapiano</option>
<option>R&B</option><option>Gospel</option><option>Podcast Talk</option><option>Education</option>
</select>
<textarea id="description" placeholder="Short description..."></textarea>
</div>

<!-- Campus Tag -->
<div class="glass">
<div class="section-title">Campus Tag</div>
<input id="country" placeholder="Country">
<input id="university" placeholder="University">
</div>

<!-- Cover Upload -->
<div class="glass">
<div class="section-title">Cover Art</div>
<div class="upload-box">
<input type="file" id="coverInput" accept="image/*">
</div>
<div class="preview">
<img id="coverPreview">
</div>
</div>

<!-- Audio Upload -->
<div class="glass">
<div class="section-title">Audio File</div>
<div class="upload-box">
<input type="file" id="audioInput" accept="audio/*">
</div>
<div class="preview">
<audio id="audioPreview" controls></audio>
<div class="waveform" id="waveform"></div>
</div>
</div>

<!-- Publish Options -->
<div class="glass">
<div class="section-title">Publish Options</div>
<label><input type="checkbox" id="radio"> Publish to Campus Radio</label>
<label><input type="checkbox" id="chart"> Submit to Campus Charts</label>

<div style="margin-top:10px;">
<label>Set ZAC Tip Price: $<span id="tipValue">0.10</span></label>
<input type="range" id="tipSlider" min="0" max="1" step="0.01" value="0.1">
</div>

<button onclick="publish()">Publish to Campus Wave</button>
</div>

</div>

<!-- Footer Navigation -->
<footer>
<a href="upload.html">⬆<br>Upload</a>
<a href="discover.html">🔍<br>Discover</a>
<a href="campus-chart.html">📊<br>Charts</a>
<a href="radio.html">📡<br>Radio</a>
<a href="profile.html">👤<br>Profile</a>
</footer>

<script>
/* Automatic Country Detection */
window.onload=function(){
const countryInput=document.getElementById("country");
if(navigator.language){
countryInput.value=navigator.language.split('-')[1]||"";
}
}

/* Cover Preview */
document.getElementById("coverInput").addEventListener("change",function(){
const file=this.files[0];
if(file){
const reader=new FileReader();
reader.onload=function(e){document.getElementById("coverPreview").src=e.target.result;}
reader.readAsDataURL(file)
}
})

/* Audio Preview + Waveform Simulation */
document.getElementById("audioInput").addEventListener("change",function(){
const file=this.files[0];
if(file){
const url=URL.createObjectURL(file);
document.getElementById("audioPreview").src=url;
generateWaveform();
}
})

function generateWaveform(){
const waveform=document.getElementById("waveform");
waveform.innerHTML="";
for(let i=0;i<50;i++){
const bar=document.createElement("div");
bar.className="wave-bar";
bar.style.left=(i*4)+"px";
bar.style.animationDelay=(Math.random()*0.5)+"s";
waveform.appendChild(bar);
}
}

/* Tip Slider */
const tipSlider=document.getElementById("tipSlider");
const tipValue=document.getElementById("tipValue");
tipSlider.addEventListener("input",()=>{tipValue.innerText=tipSlider.value;})

/* Publish Simulation */
function publish(){
const title=document.getElementById("title").value;
const artist=document.getElementById("artist").value;
const genre=document.getElementById("genre").value;
const country=document.getElementById("country").value;
const university=document.getElementById("university").value;
const tip=parseFloat(tipSlider.value);

let uploads=JSON.parse(localStorage.getItem("campusUploads"))||[];
uploads.push({
title, artist, genre, country, university, tip, date:new Date().toISOString(),
radio:document.getElementById("radio").checked,
chart:document.getElementById("chart").checked,
plays:0, tipsReceived:0
});
localStorage.setItem("campusUploads",JSON.stringify(uploads));
alert("Upload Published Successfully 🚀\nTip Price: $" + tip.toFixed(2));
document.getElementById("audioPreview").play();
window.location.href="dashboard.html";
}
</script>
</body>
</html>
