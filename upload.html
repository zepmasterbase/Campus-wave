<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave — Upload</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Poppins&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#00f0ff;
  --violet:#9c4dff;
  --bg:radial-gradient(circle at 30% 10%, #050018, #00000c);
  --glass:rgba(255,255,255,0.08);
  --text-light:rgba(255,255,255,.85);
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Poppins,sans-serif;}
body{background:var(--bg);color:#fff;min-height:100vh;display:flex;flex-direction:column;}
header{
  display:flex;justify-content:space-between;align-items:center;padding:16px 20px;
  backdrop-filter:blur(12px);background:rgba(0,0,0,.35);
  border-bottom:1px solid rgba(255,255,255,.08);
}
header .brand{
  font-family:Orbitron;
  font-size:1.5rem;
  background:linear-gradient(90deg,var(--blue),var(--violet));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.container{
  max-width:600px;
  margin:20px auto;
  padding:16px;
  display:flex;
  flex-direction:column;
  gap:20px;
}
.card{
  background:var(--glass);
  padding:20px;
  border-radius:18px;
  border:1px solid rgba(255,255,255,.12);
  display:flex;
  flex-direction:column;
  gap:12px;
}
.card input, .card textarea, .card select{
  padding:12px;
  border:none;
  border-radius:12px;
  background:rgba(255,255,255,0.05);
  color:#fff;
}
.card input::placeholder, .card textarea::placeholder{
  color:rgba(255,255,255,0.6);
}
.card button{
  padding:12px;
  border:none;
  border-radius:999px;
  font-family:Orbitron;
  background:linear-gradient(90deg,var(--blue),var(--violet));
  color:#050015;
  cursor:pointer;
  transition:.3s;
}
.card button:hover{
  transform:translateY(-2px);
  box-shadow:0 0 15px var(--blue),0 0 30px var(--violet);
}
.preview{
  display:flex;
  flex-direction:column;
  gap:8px;
}
.preview img{
  width:100px;
  height:100px;
  object-fit:cover;
  border-radius:12px;
  box-shadow:0 0 10px var(--blue),0 0 15px var(--violet);
}
.track-card{
  background:rgba(255,255,255,.05);
  padding:12px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.track-card:hover{
  transform:scale(1.02);
  box-shadow:0 0 10px var(--blue),0 0 20px var(--violet);
  transition:.3s;
}
</style>
</head>
<body>

<header>
  <div class="brand">Campus Wave</div>
  <button onclick="location.href='discover.html'">Discover</button>
</header>

<div class="container">
  <h2>Upload Music / Podcast</h2>
  <div class="card">
    <label>Upload Cover Art</label>
    <input type="file" id="coverArt" accept="image/*">
    
    <label>Title</label>
    <input type="text" id="trackTitle" placeholder="Track / Podcast Title">
    
    <label>Genre</label>
    <select id="trackGenre">
      <option value="">Select Genre</option>
      <option>Hip-Hop</option>
      <option>Afrobeats</option>
      <option>R&B</option>
      <option>Pop</option>
      <option>Jazz</option>
      <option>Podcast</option>
      <option>Other</option>
    </select>
    
    <label>Description</label>
    <textarea id="trackDesc" placeholder="Brief description of your track / podcast"></textarea>
    
    <label>Upload Audio File</label>
    <input type="file" id="audioFile" accept="audio/*">
    
    <button onclick="uploadTrack()">Upload</button>
  </div>

  <h3>Your Uploaded Tracks</h3>
  <div id="uploadedTracks" class="preview">
    <!-- Uploaded tracks preview will appear here -->
  </div>
</div>

<script>
// Check logged-in student
const currentUserId = localStorage.getItem("currentUserId");
const users = JSON.parse(localStorage.getItem("users")) || {};
if(!currentUserId || !users[currentUserId]) window.location.href="login.html";
const currentUser = users[currentUserId];

let uploadedTracks = currentUser.uploadedMusic || [];

// Upload Track
function uploadTrack(){
  const title = document.getElementById("trackTitle").value.trim();
  const genre = document.getElementById("trackGenre").value;
  const desc = document.getElementById("trackDesc").value.trim();
  const coverArtInput = document.getElementById("coverArt");
  const audioInput = document.getElementById("audioFile");

  if(!title || !genre || !audioInput.files.length){
    alert("Please fill all required fields and upload audio file.");
    return;
  }

  // Read cover image as DataURL
  let coverArtURL = "";
  if(coverArtInput.files.length){
    const reader = new FileReader();
    reader.onload = function(e){
      coverArtURL = e.target.result;
      saveTrack(title, genre, desc, coverArtURL, audioInput.files[0].name);
    }
    reader.readAsDataURL(coverArtInput.files[0]);
  } else {
    saveTrack(title, genre, desc, coverArtURL, audioInput.files[0].name);
  }
}

function saveTrack(title, genre, desc, coverArtURL, audioFileName){
  const track = {title, genre, desc, coverArtURL, audioFileName};
  uploadedTracks.push(track);
  currentUser.uploadedMusic = uploadedTracks;
  users[currentUserId] = currentUser;
  localStorage.setItem("users", JSON.stringify(users));
  renderTracks();
  alert("Track uploaded successfully!");
  document.getElementById("trackTitle").value="";
  document.getElementById("trackGenre").value="";
  document.getElementById("trackDesc").value="";
  document.getElementById("coverArt").value="";
  document.getElementById("audioFile").value="";
}

// Render uploaded tracks
function renderTracks(){
  const container = document.getElementById("uploadedTracks");
  container.innerHTML="";
  uploadedTracks.forEach((track,i)=>{
    const div = document.createElement("div");
    div.className="track-card";
    div.innerHTML=`
      <div>
        <strong>${track.title}</strong> <br>
        ${track.genre} ${track.desc ? "- "+track.desc : ""}
      </div>
      <div>
        ${track.coverArtURL ? `<img src="${track.coverArtURL}" alt="Cover Art">` : ""}
      </div>
    `;
    container.appendChild(div);
  });
}

// Initial render
renderTracks();
</script>
</body>
</html>
