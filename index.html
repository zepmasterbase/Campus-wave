<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave — Discover African Student Music</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;700&family=Poppins:wght@300;400,500,600&display=swap" rel="stylesheet">
<style>
:root {
  --wave-blue: #00f0ff;
  --wave-violet: #9c4dff;
  --green: #00ff94;
  --yellow: #ffcc00;
  --glass: rgba(255,255,255,.08);
  --bg-dark: #050018;
  --text-light: rgba(255,255,255,.9);
  --transition: 0.3s;
  --player-height: 100px;
}

/* RESET */
* {margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif;}
body {background: linear-gradient(135deg, #050018, #0c0025); color:#fff; min-height:100vh; display:flex; flex-direction:column; overflow-x:hidden;}
a {text-decoration:none;color:inherit;}
button {cursor:pointer; transition: var(--transition); font-family:Orbitron;}

/* HEADER */
header {
  display:flex; justify-content:space-between; align-items:center;
  padding:16px 24px; backdrop-filter:blur(12px);
  background: rgba(0,0,0,.35); border-bottom:1px solid rgba(255,255,255,.08);
  position: sticky; top:0; z-index:1000;
}
.brand {display:flex;align-items:center;gap:10px;cursor:pointer;}
.brand img {width:50px; height:50px; object-fit:contain;}
.brand span {
  font-family:Orbitron; font-size:1.5rem;
  background: linear-gradient(90deg,var(--wave-blue),var(--wave-violet));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
}
nav button {margin-left:12px; padding:10px 18px; border-radius:999px; border:none; background:linear-gradient(90deg,var(--wave-blue),var(--wave-violet)); color:#050015;}
nav button:hover {transform:scale(1.05);}

/* HERO */
.hero {padding:60px 24px; text-align:center; position:relative;}
.hero h1 {font-family:Orbitron; font-size:2.8rem; margin-bottom:16px; background: linear-gradient(90deg,var(--wave-blue),var(--wave-violet)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;}
.hero p {font-size:1.2rem; color:var(--text-light);}
.hero button {margin-top:24px; padding:14px 28px; border-radius:999px; border:none; font-family:Orbitron; background:linear-gradient(90deg,var(--wave-blue),var(--wave-violet)); color:#050015;}
.hero button:hover {transform:scale(1.05);}

/* MUSIC CARDS */
.cards-container {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:24px; padding:24px;
}
.card {
  background: var(--glass); border-radius:20px; padding:16px;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  position:relative; overflow:hidden; border:1px solid rgba(255,255,255,.12);
  transition: transform var(--transition), box-shadow var(--transition);
}
.card:hover {transform:translateY(-6px); box-shadow:0 0 25px var(--wave-blue),0 0 35px var(--wave-violet);}
.card img {width:100%; border-radius:16px; margin-bottom:12px; object-fit:cover;}
.card button {margin-top:10px; padding:10px 16px; border:none; border-radius:999px; background:var(--green); color:#050015;}
.card .play-overlay {
  position:absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,.3); opacity:0;
  display:flex; align-items:center; justify-content:center; transition:var(--transition);
}
.card:hover .play-overlay {opacity:1;}
.card .play-overlay span {font-size:36px; color:#fff;}

/* WAVEFORM ANIMATION */
.waveform {
  display:flex; align-items:flex-end; gap:2px; height:40px; margin-top:8px;
}
.waveform div {width:3px; background:var(--wave-blue); animation:wave 1s infinite; transform-origin:bottom;}
.waveform div:nth-child(2){animation-delay:0.1s;}
.waveform div:nth-child(3){animation-delay:0.2s;}
.waveform div:nth-child(4){animation-delay:0.3s;}
.waveform div:nth-child(5){animation-delay:0.4s;}
@keyframes wave {
  0%,100%{height:4px;}
  50%{height:40px;}
}

/* MAP DISCOVERY */
.map-container {background: var(--glass); margin:24px; border-radius:20px; padding:16px; height:300px; text-align:center; line-height:300px; color:var(--text-light); font-weight:bold; font-size:1.2rem;}

/* LOGIN MODAL */
.modal-bg {position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,.8); display:none; align-items:center; justify-content:center; z-index:999;}
.modal {background: var(--glass); padding:24px; border-radius:16px; max-width:400px; width:90%; position:relative;}
.modal input {width:100%; padding:12px; border-radius:10px; border:none; margin-bottom:12px;}
.modal button {padding:12px 20px; border:none; border-radius:999px; background:linear-gradient(90deg,var(--wave-blue),var(--wave-violet)); color:#050015;}
.modal .close-btn {position:absolute; top:10px; right:14px; cursor:pointer; font-size:18px; font-weight:700; color:#fff;}

/* FLOATING PLAYER */
.player {
  position:fixed; bottom:0; left:50%; transform:translateX(-50%);
  width:95%; max-width:1000px; height:var(--player-height);
  background:rgba(255,255,255,0.06); backdrop-filter:blur(15px);
  border-radius:24px; padding:12px; display:flex; align-items:center; justify-content:space-between;
  box-shadow:0 0 25px rgba(0,0,0,.5); z-index:1000;
}
.player-info {display:flex; align-items:center; gap:14px;}
.player-info img {width:60px; height:60px; border-radius:12px; object-fit:cover;}
.player-details {display:flex; flex-direction:column;}
.player-details strong {font-family:Orbitron; font-size:1rem; margin-bottom:4px;}
.player-details .waveform {height:20px; margin-top:4px;}
.player-controls {display:flex; align-items:center; gap:10px;}
.player-controls button {padding:10px; border-radius:50%; border:none; background:var(--wave-blue); color:#050015; font-size:16px;}
.player-progress {flex:1; height:6px; background:rgba(255,255,255,.2); border-radius:3px; margin:0 12px; position:relative;}
.player-progress div {height:100%; width:50%; background:var(--wave-violet); border-radius:3px; transition:width 0.3s;}

/* RESPONSIVE */
@media(max-width:600px){
  .cards-container{grid-template-columns:1fr;}
  .player{flex-direction:column; height:auto; padding:12px;}
  .player-info{margin-bottom:8px;}
}
</style>
</head>
<body>

<header>
  <div class="brand" onclick="location.href='#'">
    <img src="https://pe56d.s3.amazonaws.com/o_1jhp2503i1gm41unj1tlt1me117of15.png" alt="Campus Wave Logo">
    <span>Campus Wave</span>
  </div>
  <nav>
    <button onclick="openModal()">Login / Signup</button>
  </nav>
</header>

<section class="hero">
  <h1>The Sound of African Campuses 🌍🎵</h1>
  <p>Discover, listen, tip, and support student artists across Africa.</p>
  <button>Explore Music</button>
</section>

<section class="cards-container">
  <div class="card">
    <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=220&q=80" alt="">
    <div class="play-overlay"><span>▶</span></div>
    <strong>Kwame Nkrumah</strong>
    <p>University of Ghana</p>
    <div class="waveform"><div></div><div></div><div></div><div></div><div></div></div>
    <button>Tip $1</button>
  </div>
  <div class="card">
    <img src="https://images.unsplash.com/photo-1507874457470-272b3c8d8ee2?auto=format&fit=crop&w=220&q=80" alt="">
    <div class="play-overlay"><span>▶</span></div>
    <strong>Nana Ama</strong>
    <p>University of Cape Coast</p>
    <div class="waveform"><div></div><div></div><div></div><div></div><div></div></div>
    <button>Tip $1</button>
  </div>
  <!-- Add more artist cards as needed -->
</section>

<section class="map-container">
  University Discovery Map (coming soon)
</section>

<div class="modal-bg" id="modalBg">
  <div class="modal">
    <span class="close-btn" onclick="closeModal()">×</span>
    <h3>Login or Signup</h3>
    <input type="text" placeholder="Email">
    <input type="password" placeholder="Password">
    <button>Continue</button>
  </div>
</div>

<div class="player">
  <div class="player-info">
    <img src="https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?auto=format&fit=crop&w=60&q=80" alt="Current Song">
    <div class="player-details">
      <strong>Kwame Nkrumah - Beat Track</strong>
      <div class="waveform"><div></div><div></div><div></div><div></div><div></div></div>
    </div>
  </div>
  <div class="player-progress"><div></div></div>
  <div class="player-controls">
    <button>⏮</button>
    <button>▶</button>
    <button>⏭</button>
  </div>
</div>

<script>
function openModal(){document.getElementById("modalBg").style.display="flex";}
function closeModal(){document.getElementById("modalBg").style.display="none";}
</script>

</body>
</html>
