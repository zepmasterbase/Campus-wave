<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave Player</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

:root{
--neon-blue:#00f0ff;
--neon-purple:#8a2bff;
--neon-green:#1db954;
--bg:#070713;
}

body{
margin:0;
background:radial-gradient(circle at top,var(--neon-purple),var(--bg));
color:white;
font-family:Poppins;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

/* Header */

.header{
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.header button{
background:none;
border:none;
color:white;
font-size:20px;
}

/* Album Cover */

.album-container{
margin-top:20px;
position:relative;
}

.album{
width:260px;
height:260px;
border-radius:20px;
box-shadow:0 0 25px var(--neon-blue);
animation:spin 12s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg)}
to{transform:rotate(360deg)}
}

/* Track info */

.track-info{
text-align:center;
margin-top:20px;
}

.track-title{
font-size:22px;
font-weight:600;
}

.artist{
opacity:.8;
}

/* Waveform */

.waveform{
display:flex;
gap:4px;
margin:30px 0;
height:40px;
align-items:flex-end;
}

.bar{
width:5px;
background:var(--neon-green);
animation:wave 1s infinite ease-in-out;
}

.bar:nth-child(2){animation-delay:.1s}
.bar:nth-child(3){animation-delay:.2s}
.bar:nth-child(4){animation-delay:.3s}
.bar:nth-child(5){animation-delay:.4s}
.bar:nth-child(6){animation-delay:.5s}

@keyframes wave{
0%{height:8px}
50%{height:40px}
100%{height:8px}
}

/* Controls */

.controls{
display:flex;
gap:30px;
align-items:center;
margin:20px 0;
}

.controls button{
background:var(--neon-green);
border:none;
width:55px;
height:55px;
border-radius:50%;
font-size:20px;
cursor:pointer;
}

/* Actions */

.actions{
display:flex;
gap:16px;
margin-top:10px;
}

.actions button{
background:#111;
border:1px solid var(--neon-blue);
color:white;
padding:10px 16px;
border-radius:20px;
cursor:pointer;
}

.actions button:hover{
box-shadow:0 0 10px var(--neon-blue);
}

/* Lyrics */

.lyrics{
margin-top:30px;
width:100%;
max-width:400px;
background:#111;
padding:20px;
border-radius:14px;
max-height:200px;
overflow-y:auto;
font-size:14px;
line-height:1.6;
}

/* Responsive */

@media(max-width:500px){

.album{
width:220px;
height:220px;
}

}

audio{display:none}

</style>
</head>

<body>

<div class="header">

<button onclick="history.back()">⬅</button>

<h3>Now Playing</h3>

<button onclick="shareTrack()">🔗</button>

</div>

<div class="album-container">
<img id="cover" class="album">
</div>

<div class="track-info">
<div id="title" class="track-title">Track Title</div>
<div id="artist" class="artist">Artist</div>
</div>

<div class="waveform">

<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>
<div class="bar"></div>

</div>

<div class="controls">

<button onclick="prev()">⏮</button>
<button onclick="togglePlay()">▶</button>
<button onclick="next()">⏭</button>

</div>

<div class="actions">

<button onclick="tipArtist()">💸 Tip Artist</button>
<button onclick="shareTrack()">📤 Share</button>

</div>

<div class="lyrics">

<strong>Lyrics</strong>

<p id="lyricsText">

No lyrics uploaded yet.

Student artists will be able to upload lyrics from their dashboard.

Campus Wave is powering the future of campus music 🌊

</p>

</div>

<audio id="audio"></audio>

<script>

/* Demo tracks */

let tracks = JSON.parse(localStorage.getItem("campusUploads")) || [

{
title:"Campus Vibes",
artist:"Student Artist",
cover:"https://picsum.photos/300?1",
url:"https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"
}

]

let current=0

const audio=document.getElementById("audio")

function loadTrack(){

let track=tracks[current]

document.getElementById("cover").src=track.cover
document.getElementById("title").innerText=track.title
document.getElementById("artist").innerText=track.artist

audio.src=track.url

}

loadTrack()

function togglePlay(){

if(audio.paused){
audio.play()
}else{
audio.pause()
}

}

function next(){

current++
if(current>=tracks.length){current=0}

loadTrack()
audio.play()

}

function prev(){

current--
if(current<0){current=tracks.length-1}

loadTrack()
audio.play()

}

/* Zep Cash tip simulation */

function tipArtist(){

let tips=JSON.parse(localStorage.getItem("zepTips"))||{}

let track=tracks[current].title

tips[track]=(tips[track]||0)+5

localStorage.setItem("zepTips",JSON.stringify(tips))

alert("You tipped 5 Zep Cash 💸")

}

/* Share */

function shareTrack(){

let track=tracks[current]

navigator.share?.({
title:track.title,
text:"Listen on Campus Wave",
url:window.location.href
}) || alert("Share this track with friends!")

}

</script>

</body>
</html>
