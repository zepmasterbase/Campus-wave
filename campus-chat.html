<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Wave | Chat</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* GLOBAL */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins,sans-serif;
}

body {
  background:#0a0a0f;
  color:white;
  overflow:hidden;
  height:100vh;
  display:flex;
}

/* SIDEBAR */
.sidebar {
  width:260px;
  background:linear-gradient(180deg,#12121a,#0b0b12);
  padding:20px;
  border-right:1px solid rgba(255,255,255,.1);
}

.sidebar h2 {
  color:#00ffd5;
  font-size:20px;
  margin-bottom:20px;
}

.channel {
  padding:12px;
  cursor:pointer;
  border-radius:8px;
  margin-bottom:10px;
  transition:.3s;
}

.channel:hover {
  background:rgba(0,255,213,.1);
}

/* MAIN CHAT AREA */
.chat-container {
  flex:1;
  display:flex;
  flex-direction:column;
  height:100%;
}

.chat-header {
  padding:18px 24px;
  border-bottom:1px solid rgba(255,255,255,.1);
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.chat-header h3 {
  color:#00ffd5;
  font-size:22px;
}

.chat-messages {
  flex:1;
  padding:20px;
  overflow-y:auto;
}

.message {
  margin-bottom:14px;
  max-width:70%;
  display:flex;
  gap:10px;
}

.message .avatar {
  width:40px;
  height:40px;
  border-radius:50%;
  object-fit:cover;
}

.message.user {
  justify-content:flex-end;
}

.message.user .bubble {
  background:linear-gradient(135deg,#00ffd5,#6a5cff);
  color:black;
  text-align:right;
}

.bubble {
  background:rgba(255,255,255,.08);
  padding:12px 16px;
  border-radius:20px;
  position:relative;
  word-break:break-word;
  font-size:14px;
}

.bubble .meta {
  font-size:11px;
  opacity:.7;
  margin-top:6px;
}

/* INPUT AREA */
.chat-input-area {
  padding:12px 20px;
  background:rgba(0,0,0,.4);
  border-top:1px solid rgba(255,255,255,.08);
  display:flex;
  gap:10px;
  align-items:center;
}

.chat-input-area input[type="text"] {
  flex:1;
  background:rgba(255,255,255,.05);
  border:none;
  padding:12px;
  border-radius:999px;
  color:white;
  font-size:14px;
  outline:none;
}

.chat-input-area button {
  background:linear-gradient(135deg,#00ffd5,#6a5cff);
  border:none;
  padding:10px 14px;
  border-radius:999px;
  cursor:pointer;
  font-size:16px;
  color:black;
  transition:.3s;
}

.chat-input-area button:hover {
  transform:scale(1.05);
}

/* TYPING */
.typing-indicator {
  font-size:12px;
  opacity:.65;
  margin-top:4px;
}

/* EMOJI PICKER (simple) */
.emoji-picker {
  display:flex;
  gap:6px;
  padding:8px;
  background:rgba(255,255,255,.05);
  border-radius:10px;
  margin-bottom:10px;
}

.emoji-picker span {
  cursor:pointer;
  font-size:20px;
}

</style>

</head>
<body>

<div class="sidebar">
  <h2>Campus Chat Rooms</h2>
  <div class="channel" onclick="selectChannel('General')"># General</div>
  <div class="channel" onclick="selectChannel('Music')"># Music</div>
  <div class="channel" onclick="selectChannel('Jobs')"># Jobs</div>
  <div class="channel" onclick="selectChannel('Study')"># Study Buddies</div>
</div>

<div class="chat-container">

  <div class="chat-header">
    <h3 id="roomName"># General</h3>
    <span class="typing-indicator" id="typingIndicator"></span>
  </div>

  <div class="chat-messages" id="chatMessages"></div>

  <div class="emoji-picker" id="emojiPicker">
    <span onclick="addEmoji('😊')">😊</span>
    <span onclick="addEmoji('🔥')">🔥</span>
    <span onclick="addEmoji('🎵')">🎵</span>
    <span onclick="addEmoji('💬')">💬</span>
    <span onclick="addEmoji('💡')">💡</span>
    <span onclick="addEmoji('🎉')">🎉</span>
  </div>

  <div class="chat-input-area">
    <input type="text" id="chatInput" placeholder="Type a message..." oninput="typing()">
    <button onclick="sendMessage()">Send</button>
    <button onclick="attachMedia()">📎</button>
    <button onclick="sendTip()">💰 Tip</button>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script>

// 🔥 1) FIREBASE CONFIG — Replace with yours
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  storageBucket: "YOUR_BUCKET",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const storage = firebase.storage();

// 2) USER SESSION
let localUsers = JSON.parse(localStorage.getItem("users")) || {};
let currentUserId = localStorage.getItem("currentUserId");
if(!currentUserId || !localUsers[currentUserId]) location.href="login.html";

let currentUser = localUsers[currentUserId];
let displayName = currentUser.name || "Anonymous";

// 3) CHAT STATE
let room = "General";

// Select channel
function selectChannel(c){
  room = c;
  document.getElementById("roomName").innerText = "# " + room;
  loadMessages();
}

// 4) SEND MESSAGE
function sendMessage(){
  let text = document.getElementById("chatInput").value.trim();
  if(!text) return;
  db.collection("chatRooms").doc(room).collection("messages").add({
    text,
    sender:displayName,
    uid:currentUserId,
    time:firebase.firestore.FieldValue.serverTimestamp()
  });
  document.getElementById("chatInput").value = "";
}

// 5) LISTEN FOR NEW MESSAGES
function loadMessages(){
  document.getElementById("chatMessages").innerHTML = "";
  db.collection("chatRooms").doc(room).collection("messages")
  .orderBy("time","asc")
  .onSnapshot(snapshot => {
    document.getElementById("chatMessages").innerHTML = "";
    snapshot.forEach(doc => {
      const msg = doc.data();
      let side = msg.uid===currentUserId ? "user" : "";
      document.getElementById("chatMessages").innerHTML += `
        <div class="message ${side}">
          <div class="bubble">
            <strong>${msg.sender}</strong><br>${msg.text}
            <div class="meta">${new Date(msg.time?.toDate()).toLocaleTimeString()}</div>
          </div>
        </div>
      `;
    });
    document.getElementById("chatMessages").scrollTop = 999999;
  });
}
loadMessages();

// 6) TYPING INDICATOR
let typingTimeout;
function typing(){
  db.collection("chatRooms").doc(room).update({typing:displayName});
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(()=>{
    db.collection("chatRooms").doc(room).update({typing:""});
  },1000);
}

db.collection("chatRooms").doc(room).onSnapshot(doc => {
  let d = doc.data();
  document.getElementById("typingIndicator").innerText = d?.typing ? d.typing + " is typing..." : "";
});

// 7) EMOJI
function addEmoji(e){ document.getElementById("chatInput").value += e; }

// 8) MEDIA ATTACHMENTS
function attachMedia(){
  alert("Media upload not yet enabled — backend integration needed");
}

// 9) TIPPING
function sendTip(){
  let tipAmount = prompt("Enter ZAC to tip:");
  if(!tipAmount) return;
  db.collection("chatRooms").doc(room).collection("tips").add({
    uid:currentUserId,
    amount:parseFloat(tipAmount),
    time:firebase.firestore.FieldValue.serverTimestamp()
  });
  alert(`Tipped ${tipAmount} ZAC to room 💰`);
}

</script>

</body>
</html>
